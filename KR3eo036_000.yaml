body:
  text: 一中風門原文一法正倚壁不息行氣從頭至足止愈疽疝大風偏枯諸風痹解説採用正立背靠牆姿勢不息行氣功法詳見本節討論運用意識導氣使內氣從頭至足而止這種練功法可以治療疽病疝氣大風半身不遂以及各種風痹病原文二法仰兩足指五息止引腰背痹偏枯令人耳聞聲常行眼耳諸根無有挂礙解説將兩腳趾仰起行氣五息而止引氣至腰背可以治療腰背痹痛和半身不遂並能改善人的聽覺經常用此法練功還能使諸根佛家稱眼耳鼻舌身意為六根根是能生的意思因眼耳等對於聲色等能産生感覺故稱為根清淨不受病邪和外界不良因素的侵襲和干擾原文三法以背正倚展兩足及指瞑心收心使之安靜從頭上引氣想以達足之十趾及足掌心可三七引候掌心似受氣止蓋謂上引泥丸下達湧泉是也解説採用背部端正靠牆壁的坐式伸展兩腳和足趾排除雜念使心神寧靜從頭上引氣使內氣隨意念向下行到雙腳十趾及足掌心的湧泉穴如此反復以意引氣做二十一次等到腳底似有受氣的感覺時為止這就是所謂上引泥丸下達湧泉的功法原文四法正柱倚壁不息行氣從口趣同促令氣至頭始止治疽痹大風偏枯解説採用背部端正靠牆的坐式不息行氣以意念引導內氣從嘴內至頭頂為止可以治療疽病痹症大風和半身不遂原文五法一足踏同踏踏地足不動一足向側相轉身欷通欹斜傾側勢並手盡急回左右迭二七去脊風冷偏枯不通潤解説一隻腳踏地不動另一腳伸向側面轉身成斜勢兩手相合儘量隨身體掉轉左右交替十四次可消除脊背風寒半身不遂引起的氣血不能通達潤養肢體原文六法手前後遞交替順次更迭互拓舉推極勢三七手掌向下頭低面心氣向下至湧泉倉門卻努一時取勢散氣放縱身氣平頭動髆同膊肩膀肩胛前後欹側柔轉二七去髆並冷血筋急漸漸如消解説兩手前後交替互推盡力活動二十一次然後停止推手手掌朝下低頭面向心胸以意行氣下達湧泉穴和倉門氣至後守一會兒收功收功時要放鬆全身將氣散開使氣平調此後再活動頭部向肩部前後左右傾斜柔和自如地轉動十四次這種功法可以祛除肩部血脈的寒邪使筋脈拘急逐漸消除原文七法兩手抱左膝伸腰鼻納氣七息展右足除難屈伸拜起脛中痛痿解説採用踞坐姿式用兩手抱左膝頭伸腰伸展右腿以鼻吸氣行氣七息可治療下肢活動障礙難以屈伸跪拜起立小腿疼痛痿軟無力原文八法兩手抱右膝著膺胸除下重難屈伸解説用踞坐位兩手抱右膝貼胸可消除下肢沉重難以屈伸原文九法踞憑倚坐伸右腳兩手抱左膝頭伸腰以鼻納氣自極七息展左足著外除難屈伸拜起脛中疼痹解説採用踞坐位即倚坐位伸展右腿兩手抱左膝頭伸腰用鼻吸氣儘量使吸呼深長行氣七息然後伸左腿足向外展這種功法能治療下肢屈伸跪拜起立困難小腿疼痛腫脹麻木原文十法立身上下正直一手上拓仰手如似推物勢一手向下如捺物極勢上下來去換易四七去膊內風兩膊井內冷血兩腋筋脈攣急解説採用站式使身體上下正直一手向上舉仰掌象推東西一樣一手向下象按捺東西兩手儘量用力上下反復交替進行二十八次這種功法可祛除肩膀內的風邪兩肩井內血脈受寒兩腋筋脈拘急痙攣原文十一法踞伸左腳兩手抱右膝伸腰以鼻納氣自極七息展左足著外除難屈伸拜起脛中疼解説踞坐位伸展左腳兩手抱右膝伸直腰用鼻吸氣儘量使吸呼深長行氣七息然後再伸左腳外展此法可治療下肢屈伸跪拜起立困難小腿疼痛本節與原文第九法動作大致相同一為右一為左交替進行即為一個完整功法原文十二法偃臥仰面而臥合兩膝布兩足伸腰口納氣振腹七息除壯熱疼痛兩脛不隨解説採取仰臥位併攏兩膝伸展兩腳把腰伸直用口吸氣使氣達腹中小腹隨吸氣鼓起呼氣收縮上下振蕩連作七息而止這種功法可治療高熱身疼痛兩小腿動作不便原文十三法治四肢疼悶及不隨腹內積氣床席必須平穩正身仰臥緩解衣帶枕高三寸握固握固者以兩手各自以四指把手拇指舒臂令去身各五寸兩腳豎指相去五寸安心定意調和氣息莫思餘事專意念氣徐徐漱醴甜酒泉者以舌舐略唇口牙齒然後咽唾徐徐以口吐氣鼻引氣入喉須微微緩作不可卒急強作待好調和引氣勿令自聞出入之聲每引氣心心念送之從腳趾頭使氣出引氣五息六息一出之為一息一息數至十息漸漸增益得至百息二百息病即除愈不用食生菜及魚肥肉大飽食後喜怒憂恚恨忿悉不得輒行氣惟須向曉清靜時行氣大佳能愈萬病解説治療四肢疼悶和活動不便腹中積氣導引時床席必須平穩採用正身仰臥位鬆解衣帶枕高以三寸為宜兩手握固握固就是用兩手四指握住大拇指握固後舒展兩臂使其距離身軀兩旁各五寸兩腳趾立起兩腳之間相距亦為五寸體位擺好後要安心定意調和呼吸莫思其它雜事並徐徐地嗽醴泉所謂醴泉即是用舌舐唇口牙齒所産生的唾液因為唾液能滋潤腸胃幫助消化勝過甘美如甜酒的泉水所以被稱為醴泉將産生的唾液先嗽口齒然後咽下再徐徐以口吐氣用鼻引氣入咽喉這些動作要輕要慢不可著急硬做等待做好這些動作進一步調和呼吸引氣入里引氣時勿要使自己耳聽到呼吸出入的聲音每次引氣要專心以意念送氣使氣達足並由趾頭使氣出這樣引氣五息六息會從腳趾頭出氣一次這種功法能把從腳趾頭出氣一次作為一息初做者由一息數到十息以後漸漸增加能行到一二百息病就好了治療期間不要吃生菜魚和肥肉進食過飽之後以及喜怒憂忿時都不可行氣惟有在凌晨清靜時侯行氣最好這種功法能治療各種疾病原文十四法展兩足上除不仁脛寒之疾也解説展開兩足向上抬腳可以治療麻木不仁及小腿寒痹小結本書首篇敘述了中風病的導引治療中醫認為風是四時之氣分布八方主長養萬物正常的風不會傷人當人體正氣不足或氣候驟變時人體受到邪風侵襲才會生病古人把這種邪風傷人所致之病統稱為中風如諸病源候論卷一風病諸候中説中風者風氣中於人也包括了風邪入中人體引起的風痹風濕中風偏枯半身不遂中風不仁肢體肌膚麻木中風口喎口眼歪斜大風等多種疾病現代所説的中風是指突然昏倒不省人事言語困難口眼歪斜半身不遂的病症大致相當於西醫所説的腦血管意外包括腦出血腦血栓形成腦血管痙攣腦栓塞等疾病及其後遺症本篇的導引法對後一種中風後遺症的康復十分有益本節提出的中風病導引法有靜功動功和動靜結合功多種體位有倚壁踞坐仰臥立身等呼吸方法有不息法納氣法引氣法等並對導引行氣方法注意事項行氣要領等做了全面論述內容十分豐富茲就呼吸方法討論如下不息法不息法古人又稱為閉氣法悶氣法等就是吸氣後停閉呼吸片刻再呼出的練氣方法古代練功家在呼吸精氣以養生的思想指導下認為真氣者所受於天與穀氣並而充身者也練氣吐納須使吸入精氣盡量停布於體內供機體充分吸收方可充身養生即所謂使身心納氣受氣食氣者也如養性延命録説正偃臥瞑目握固閉氣不息於心中數至二百乃口吐氣出之日增息如此身神俱五臟安能閉氣至二百五十息華蓋肺明華蓋明則耳目聰明舉身無病邪不忤侵襲人也備急千金要方説和神導氣之道當得密室閉戶安床暖席枕高二寸半正身偃臥瞑目閉氣於胸膈中以鴻毛著鼻上而不動經三百息耳無所聞目無所見心無所思則寒暑不能侵蜂蠆不能毒壽三百六十歲此鄰於真人者也可見古代練功家非常重視閉氣不息的呼吸方法認為它可祛病延壽使人身心俱安具體練習方法備急千金要方卷二十七調氣法説得比較詳明其法是引氣從鼻入腹足則停止有力更取久住氣悶從口細細吐出盡還以鼻細細引入出氣一此前法宋代大文學家蘇東坡説既云閉氣於胸膈恐是不閉鼻中氣只以意堅守此氣於胸膈中令出入息似動不動氤氳縹眇如香爐蓋上煙湯瓶嘴中氣自在出入無呼吸之者則鴻毛可以不動若心不起念雖過三百息可也可見不息之法不是停止呼吸而是使吸入之氣在體內有所停留練習要點是一是要使呼吸深長細勻由呼吸淺短次數多而變成細長中間停閉次數少正常人的呼吸平均每分鐘次練不息功日久後可達到每分鐘次甚至次而不感氣悶不適仍然自然舒適二是要配合數息默數鼻端吸入氣後的次數從一數至十或數百使氣閉時間自然延長三是以意守氣於胸膈肺華蓋中使氣似動非動如煙如霧瀰漫於體內但閉氣法的練習一定要漸進自然切勿硬閉而使氣憋頭悶産生不良副作用文中的自極七息的自極字義雖是儘量用力但不是説要用力憋氣閉氣而是要使呼吸盡量深細勻長每分鐘內減少呼吸次數清李涵虛道竅談中説一呼一吸名曰一息須順其自然要是硬閉拖長時間就會使氣則竭並氣則傷因此停閉呼吸法無論是呼停閉氣還是吸停閉氣在練功初期都不宜隨便應用必須經過一個時期的鍛鍊在形成深長的腹式呼吸和勻細入出後方可漸進而不息初期停閉時間不宜太長不息太長常會引起氣機壅塞甚至胸悶頭暈胸脅不適疼痛腹脹等納氣法納氣法即是吐納法可用鼻納氣口吐氣或口納氣鼻吐氣如本篇十一法説以鼻納氣自極七息十二法説口納氣振腹七息王子喬八神導引法認為納氣的要領是勿有所念定意乃以鼻徐納氣以口吐之各致其臟所竟而復始欲休先極之而止勿強長息久習乃自長矣氣之往來勿令耳聞或徐以口納氣填腹自極息欲絶徐以鼻出氣也就是説納氣之法吸氣要徐徐而行安心定志排除雜念專心吸氣使達腹內而氣沉丹田氣息達到一定限度後慢慢以鼻出氣呼吸出入時要微細均勻使耳不能聞及往來切忌強硬延長呼吸要循序漸進久習自然便會深長納氣法是氣功的基本功法練習時要從自然柔和入手首先要精神安寧形體放鬆然後從自然呼吸練習起逐步使呼吸深長使氣被納入肺內時不遲不速勿忘勿助必輕必和如蠶吐絲綿綿不斷形成深長細勻的腹式呼吸然後以意念引導吸呼徐徐送氣入腹部臍下産生一種因橫膈下降而使氣體下沉丹田的感覺所謂填腹振腹脹腹及腹內松靜氣騰然即是氣沉丹田的感覺和表現古人認為納氣務求調柔入細引短令長才能使呼吸綿綿深入丹田引氣法引氣法就是行氣法導氣法如第一法説行氣從頭至足止三法説從頭上引氣想以達足之十趾及足掌心可三七引候掌心似受氣止蓋謂上引泥丸下達湧泉是也十三法説每引氣心心念送之使腳趾頭使氣出這是一種運用意識使內氣循一定路線運行如從頭至足從丹田至脊上腦內等意氣相依以意行氣的功法道家的大小周天功佛家密宗的貫氣法均與此相似雞峰普濟方認為意者氣之使意有所到則氣到每體不安處則微閉氣以意引氣到疾所而攻之必瘥引氣法是一種以意引氣攻疾祛病的方法具體功法有三種引氣攻病法如養性延命録説凡行氣欲除百病隨所在作念之頭痛念頭足痛念足和氣往攻之從時至時便自消矣本篇行氣從頭至足止愈疽疝大風偏枯諸風痹疝氣門引腹中氣遍行身體去疝瘕病等便是引氣攻病的例子引氣運行法如上引泥丸下達湧泉法泥丸是道家術語即是腦內或頭頂部位黃庭內景經説腦神精根字泥丸湧泉是穴位名位於前足心凹陷足底的前三分之一處以意念存想自身從首至足又自足至丹田上脊膂人於泥丸想其氣如雲直貫泥丸天隱子或閉口緘息存想氣真氣自尾閭升夾脊透泥丸逐其邪氣逍遙子導引訣本法是古代練功家常用的整體行氣法後世又將此法發展成了大小周天法等全身性引氣運行法具體練法請參照本書老人門通玄集周大法引氣外出法如每引氣心心念送之從腳趾頭使氣出聖濟總録説念氣從足十趾出久自覺氣通手足行之不止身日輕強氣脈柔和榮衛調暢可見引氣外出主要是以意念想象內氣外出的一種功法這種功法久行之有調和榮衛疏通氣血祛病強身的作用氣功雜志曾介紹運用引氣法戰勝癱瘓的經驗現摘録如下作者劉榮華患脊髓蛛網膜炎後四肢麻木肌肉萎縮二便失禁採用仰臥或側臥位以意念從頭至足節節放鬆並以意念思想從頭至足有一白球下落然後入地再周而復始以利入靜兩月後覺腹背發熱上肢有力眠食好轉能坐凳上後加練丹田湧泉貫氣法呼氣時用意念將丹田之氣下引至兩腳底湧泉穴吸氣時又用意念將氣引回至丹田三月後丹田充實小腹飽滿會陰跳動命門發熱自覺有氣沿脊柱而上一天早晨這熱氣終於貫通尾閭夾脊玉枕三關霎時刷地一下轟然一震恰似閃電雷嗚周身抖動從此身體上也出現了奇迹四肢麻木胸腹腰臂的緊束感都徹底解除能邁開大步行走了愈後兩次接受脈象儀心電圖斷層光電視透影等檢查結果均正常並接受中國科學院和中醫學會聯合氣功儀測試如實地描繪出了氣功鍛鍊的皮膚電阻溫度等圖象二風痹門原文一法一曰以右踵拘左足拇趾除風痹二曰以左踵拘右足拇趾除厥痹三曰兩手更引足趺置膝上除體痹解説一説採用右腳跟勾住左腳拇趾的功法可以治療風痹二説採用左腳跟勾住右腳拇趾功法可以治療厥痹三説採用兩手交替拉兩腳背放在膝蓋上可以治療體痹原文二法偃臥合兩膝頭翻兩足伸腰口納氣脹腹自極七息除痹痛熱痛兩脛不隨解説仰臥併攏兩膝伸展兩足伸腰用口吸氣吸氣時使氣達腹使腹隆起令小腹感到充實臌脹盡力如此行氣七息可消除痹痛熱痛兩腿不能自如活動原文三法踞坐伸腰以兩手引兩踵以鼻納氣自極七息引兩手布兩膝頭除痹嘔解説採用踞坐體位伸腰用兩手攀兩腳後跟用鼻吸氣盡力使呼吸深長行七息然後將兩手放在兩膝頭上這種功法可以除痹止嘔原文四法偃臥端展兩手足臂以鼻納氣自極七息搖足三十而止除胸足寒周身痹厥逆解説採用仰臥體位正直舒展兩手足臂用鼻吸氣盡力行氣作七息然後搖腳三十次而止這種功法可消除胸受寒腳受寒周身痹痛四肢厥冷原文五法正倚壁不息行氣從頭至足止愈大風偏枯諸痹解説用背端正靠牆壁而站或坐不息行氣引內氣從頭頂下達足底而止這種功法可以治療大風半身不遂各種痹症原文六法左右手夾據地以仰引腰五息止去痿痹利九竅解説採用左右手靠攏著地向上引腰行五息而止這種功法可去痿痹通利九竅原文七法仰兩足指引五息止腰背痹偏枯令人耳聞聲久行眼耳諸根無有挂礙解説行氣時仰臥將兩足趾仰翹起引氣五息止可以治療腰背痹痛半身不遂使人耳聰久行還可以使眼耳鼻舌身意佛家所説的六根保持清淨健康不受外界的侵襲和干擾本法與中風門第二法大致相同原文八法踞伸右腳兩手抱左膝頭伸腰以鼻納氣自極七息除難屈伸拜起脛中疼痛痹解説採用踞坐位伸展右腳兩手抱左膝頭伸腰用鼻吸氣盡力行七息可消除下肢難以屈伸跪拜起立小腿疼痛麻木原文九法左右拱兩臂不息九通治臂足痛勞倦風痹不隨解説採用左右臂抬起拱抱胸前姿式閉氣不息九通可治療臂足疼痛勞纍疲倦風痹不遂原文十法凡人常覺脊倔強而悶仰面努膊井向上頭左右兩向挪之左右三七一住暫停一會兒待血行氣動定然始更用初緩後急不得先急後緩若無病人常欲得旦起午時日沒三辰時辰如用辰別二七除寒熱病脊腰頸項痛風痹兩膝頸頭以鼻納氣自極七息除腰痹背痛口內生瘡牙齒風頭眩盡除解説凡人常覺得脊背倔強不舒而且頭悶可仰面儘量抬兩肩向上將頭向左右搖擺左右搖擺二十一次暫停一會兒等血氣流通穩定下來然後再作開始做時要慢以後逐漸加快不要先快後慢無病之人經常能在早起中午和日沒這三個時辰每次每時辰各作十四次能消除寒熱病脊腰頸項痛風痹兩膝頸頭疼痛用鼻吸氣每次盡力行七息可以使腰痹背痛口內生瘡牙齒風頭眩等都得到消除小結痹即閉阻不通之意當人體肌表經絡遭受外邪侵襲後氣血不能暢通因而引起肢體關節肌膚疼痛酸楚重著麻木和功能障礙等一類疾患中醫均稱為痹證諸病源候論認為痹者風寒濕三氣雜至合而成痹病在陽曰風在陰曰痹陰陽俱病曰風痹可見這裡所説的風痹是指陽經和陰經同時受風邪侵襲而引起的較嚴重痹症不完全是風邪所傷而引起行痹本篇討論了風痹症的養生導引法主張根據風痹症的不同病情選用不同導引法一般風痹體痹可採用腳跟勾腳拇趾左右交替進行數次的鍛練方法活動困難的周身痹痛可採用仰臥位或背靠牆站位不息行氣搖動兩腳腰背及下肢痿痹可採用踞坐位兩手抱膝頭伸腰或兩手靠攏著地向上引腰配合吐納行氣法進行鍛練上肢痹痛可採用抬左右兩臂拱抱胸前不息行氣脊椎及頸項痛可採用仰面抬肩左右搖頭的動作和吐納法並指出練功的時間應安排在早起中午和日沒這三個時辰練習時要先緩後快長期堅持三心腹痛門原文一法偃臥展兩脛兩手仰足指以鼻納氣自極七息除腹中弦急切痛解説仰臥伸展兩腿兩手將足趾仰翹向上用鼻吸氣盡力行七息可治腹內痙攣急劇痛原文二法偃臥口納氣鼻出之除裡急飽咽氣數十令溫中寒干吐嘔腹痛口納氣七十所大振腹咽氣數十兩手相摩令熱以摩腹令氣下解説仰臥用口吸氣鼻出氣可消除腹內裡急墜脹用口將氣吞足咽下數十次讓氣在口中變溫可以溫中祛寒治乾嘔腹痛用口深吸氣七十次使氣至腹內腹隨氣而大幅度地鼓起收縮起伏振蕩然後用口吞氣咽下數十次並用兩手相互摩擦使掌心發熱以熱掌摩腹則可使氣下原文三法偃臥仰兩足兩手鼻納氣七息除腹中弦切痛解説仰臥將兩足掌兩手掌向上仰用鼻吸氣行氣七息可消除腹中痙攣劇痛小結中醫所説心腹痛是指心下即劍突下胃脘部及腹中疼痛諸病源候論卷十六心腹痛病諸候説心腹痛者由腑臟虛弱風寒客於其間指心腹之間故也邪氣發作與正氣相擊上衝於心則心痛攻於腹則腹痛上下相攻故心腹絞痛氣不得息認為心腹痛是由於臟腑虛弱風寒停留於心腹之間邪氣上下相攻而成治療應溫中扶正理氣祛寒本篇的功法均取仰臥位展伸手足可使全身放鬆腹部舒適呼吸採取以鼻納氣口吐氣或口吸氣鼻出氣使氣達腹的腹式呼吸法吸氣時腹部隆起呼氣時腹部凹陷順呼吸或吸氣時腹部凹陷呼氣時腹部隆起逆呼吸均可但應以使氣壓腹中使小腹感到充實飽滿臌脹和振動達到一定程度後還可感到發熱這樣就能溫中祛寒調氣止痛治療腹痛嘔吐氣鬱等症實踐證明腹式呼吸法對消化系疾病如胃潰瘍胃痙攣過敏性腸炎便祕等有良好效果本篇還介紹了咽氣法和摩腹法咽氣法後世稱吞氣或食氣法是將空氣大口吞咽於胃中然後再吐出或以意引氣通過胃腸由肛門排出的一種功法這種功法可使胃腸蠕動直接得到調解使腹中氣機通利積聚消散對胃痛腹痛消化不良便祕等有良好功效咽氣可以由大口吸氣和大口吐氣的喘吸法練起逐漸能使氣停留胃中下達腸間最後由肛門排出摩腹法是調理腸胃功能的重要方法古人又稱其為摩臍腹摩生門認為腹宜常摩為養生要訣之一方法是兩手搓熱然後相疊一般右手按在左手背上用掌心在臍的周圍右邊上來左邊下去的順時鐘方向分小圈中圈大圈各轉摩次腹痛時摩腹可以理氣止痛無病之人常摩腹可以調理脾胃幫助消化健脾強身四霍亂門原文一法轉筋不住男子以手挽其陰女子以手牽乳近兩邊解説轉筋發作不止男子以手握固陰部女子以手牽乳房兩手牽住乳房兩邊即可原文二法偃臥展兩脛兩手外踵者相向亦鼻納氣自極七息除兩膝寒脛骨疼轉筋解説仰臥伸展兩腿兩手足根向外分開足趾向內相根同樣是鼻納氣盡力行氣七息可治兩膝寒痹小腿骨疼痛轉筋原文三法覆臥傍視立兩踵伸腰鼻納氣去轉筋解説俯臥側頭看一旁用兩足趾著地將兩足跟立起伸展腰鼻吸氣可治轉筋小結中醫所説霍亂是指突發吐瀉腹痛轉筋俗名抽筋指四肢筋脈痙攣牽掣疼痛的病症等症的疾病包括現代所稱的霍亂及急性腸胃炎等但不等於現代醫學的霍亂病諸病源候論卷二十二霍亂病諸候説冷熱不調飲食不節使人陰陽清濁之氣相干而變亂於腸胃之間則成霍亂霍亂而轉筋者由冷氣入於筋故也可見轉筋症主要由於寒氣入於筋脈所致本節對霍亂轉筋提出了三種導引方法一是男子用手握固陰器女子用手牽兩乳房二是仰臥舒展手足踵向外趾相對行氣七息三是俯臥側頭足趾著地立起足根伸腰納氣這些方法均簡便易行除可用治霍亂轉筋外還可以防治一般的抽筋病五嘔吐門原文一法正坐兩手向後捉腕反拓席盡勢使腹弦弦上下七左右換手亦然除腹肚冷氣宿食積胃口冷食飲進退吐逆解説坐正兩手伸向背後用一手握固另一手腕部反手按地使腹鼓起如弓弦上下鼓動七次將手左右更換同樣握腕反手按地鼓腹七次可消除腹肚中冷氣和宿食積胃以及胃口寒涼飲食入胃則嘔吐上逆原文二法偃臥展脛兩手左右蹺舉足兩足踵以鼻納氣自極七息除腰中病食苦嘔解説仰臥伸展兩腿兩手蹺起兩足根用鼻吸氣盡力行氣七息可消除腰中疾病食後苦於嘔吐原文三法坐直舒兩腳以兩手挽兩足自極十二通愈腸胃不能受食吐逆以兩手直叉兩腳底兩腳痛舒以頭枕膝上自極十二通愈腸胃不能受食吐逆解説坐地伸直兩腳用兩手牽拉兩足盡力做十二遍可治療胃不能受食嘔吐用兩手指交叉兜兩腳底直至兩腳感到困痛後鬆開使腳舒再把頭枕在膝上盡力按上法做十二遍可治腸胃不能受食嘔吐小結本篇對嘔吐提出了三種導引法第一法背手著地以使腹上下活動幫助消除宿食寒氣第二法仰臥蹺踵舒展肢體以引氣腹中使氣調嘔止第三法坐位伸腳以手握足或用手兜足以頭枕膝以活動腰腹理氣除嘔有靜功有動功患者可根據病情選用六氣門原文一法兩手向後合手拓腰向上極勢振搖臂肘來去七始得手不移直向上向下盡勢來去二七去脊心肺氣壅悶解説兩手向後左右兩手相合盡力托腰向上振搖兩臂肘來去七次然後同前式樣合手托腰將雙手直向上向下用力摩腰反復十四次可治脊心肺氣壅悶不舒原文二法兩足兩指相向五息止引心肺去厥逆上氣極用力令兩足相向意止引肺中氣出病人行肺內外展轉屈伸隨無有違逆解説兩足趾相對行氣五息止以意念引氣入心肺可消除厥逆上氣進而儘量用力使兩足相對以意念引肺中內氣出讓病人運行肺氣使肺氣在體內外展轉屈伸正常運行所到之處就會無有阻礙氣順滯消小結本篇氣門所述主要是肺氣壅塞和厥逆上氣肺主氣司呼吸主人體氣的運行靈樞九針論説肺者五臟六腑之華蓋也所謂華蓋是比喻説肺臟居上就好象在上的天覆蓋著萬物一樣肺居上而主肅降肺氣肅降才能使吸入的清氣和五穀的精微向其它各臟腑布散維持各臟腑的正常活動肅降正常則氣道通暢呼吸調勻體內外氣體得以正常交換如果肺失肅降就會出現喘咳肺氣上逆和胸悶氣壅治療時宜理氣降逆本篇採用兩手托腰搖動兩肘由上向下用力摩腰的動功和以意念引肺中內氣出的靜功調理肺氣壅塞主要是由上向下的摩腰背可使氣機舒利使氣由上向下而降以意念引肺中氣出可使鬱滯之氣消散壅塞之氣宣發若能動靜結合效果可更好慢性肺心病氣管炎哮喘等病人均可採用此功七痰飲門原文一法左右側臥不息十通治痰飲不消右有飲病右側臥左有飲病左側臥又有不消氣排之左右各十有二息治痰飲也解説左側臥或右側臥不息行氣十通可治痰飲不消右有飲病宜採用右側臥位左有飲病宜採用左側臥位如果還有痰飲不消可不息行氣以排之左右各行氣十二息這樣就可以治愈痰飲了小結痰飲是人體內水液停積輸化失常而引起的一種疾病前人將散在胃腸者稱為痰飲飲流脅下者稱為懸飲淫溢四肢肌肉者稱為溢飲支撑胸肺者稱為支飲痰飲多因肺失宣降脾腎陽虛不能運化水穀以致飲留胃腸而致主證為胸脅支滿脘部有振水音嘔吐清水痰涎口渴不欲飲頭昏目眩短氣心悸背寒冷如掌大等治療痰飲應以溫化為主因為飲為陰邪遇寒則聚得溫則行本篇主張採用側臥不息法治一般痰飲謂右有飲病右側臥左有飲病左側臥如果是較嚴重的痰飲病還應以意念引內氣排除痰飲這實際上就是前述的引氣攻病法見一中風門解説氣功可使胃腸蠕動增強膈肌活動加大脾胃運化健旺腎中陽氣得補從而令痰飲溫化三焦氣機通暢故對痰飲病有很好效果練功時若能針對痰飲留聚的部位如胸脅胃院等以意念引內氣直達病所而攻邪祛病則會收到更好療效文中不息十通的通有幾種解釋一通即一遍如諸病源候論卷二十七白髮候養生方導引法説一通者一為之令此身囊之中滿其氣不息十通即按不息法做十遍用鼻吸氣五次口吐氣一次為一通如諸病源候論卷三十二癰疽病養生方導引法説鼻內息五方一吐為一通筆者認為此處的通即是全部整個意即完成了一個完整的呼吸過程或動作即是一通如鼻內息五方一吐為一整體呼吸過程完成一遍此呼吸過程即是一通如八癆瘵門以叩齒二七過取咽氣二七為一通即齒叩十四次吞氣咽下十四次為一整體動作完成這二個十四次動作一遍為一通一通的動作次數有多有少少者一次多者十幾次不能規定一定次數為一通而應當根據實際完成一個動作的次數定通八癆瘵門原文一法以兩手著頭上相叉長氣即吐之坐地緩舒兩腳以兩手外抱膝中疾低頭入兩膝間兩手交叉頭上十三通愈三尸也解説把兩手交叉放在頭上長吸氣即吐出坐在地上慢慢地伸展兩腳用兩手從外邊將膝抱起急低頭進入兩膝之間這樣兩手交叉抱頭上行功十三遍可治三尸病原文二法叩齒二七過取咽氣二七如三百通乃止為之二十日邪氣悉去六十日小病愈百日大病除三蟲伏尸皆去面體光澤也解説叩齒十四次吞氣咽下十四次為一通如此做三百通為止連做二十日可使體內邪氣都消除做六十日小病可愈做一百日大病可除藏於體內的三蟲和伏尸均可消除使人精神煥發面體光澤小結癆瘵即是肺癆病也就是肺結核病古人認為人身中有作祟損人使人患癆瘵的三尸和三蟲等諸病源候論卷二十三尸病諸候説人身內自有三尸諸蟲與人俱生而此蟲忌惡禁忌邪惡犯之則為害傷人能與鬼靈相通常接引外邪為人患害其發作之狀或沉沉默默不得知所苦而無處不惡或腹痛脹急或磊塊踴起或攣引腰脊或精神雜錯並指出三尸為飛尸遁尸沉尸另有風尸尸注與三尸合稱五尸及伏尸等道家認為三尸是隱藏在人體的作祟之神每逢庚申日向天神訴説人的過惡損人身心三尸者上尸青姑伐人眼中尸白姑伐人五臟下尸血姑伐人胃命氣功練到一定程度可驅三尸使人長壽三蟲就是長蟲蛔蟲赤蟲薑片蟲和蟯蟲是人體寄生蟲又與伏蟲白蟲肉蟲肺蟲胃蟲弱蟲合稱九蟲本篇針對癆瘵病的特點提出了二種導引法一是以雙手抱頭長吸氣緩吐氣再坐下緩展兩腳用手抱膝向兩膝間低頭並抱頭十三通一是叩齒和吞咽氣叩齒又稱琢齒本書十九口齒門有一法東向坐不息四通上下琢齒三十六治齒痛並認為叩齒常數行之使齒不痛發牢不白頭腦不痛叩齒的方法可先叩臼齒三十六次次叩門牙三十六次再錯牙叩犬齒各三十六次最後用舌舔牙周三五遍每天清晨刷牙嗽口後進行最好也可以隨時行之九脅痛門原文一法卒左脅痛念肝為青龍左目中魂神將五營兵千乘萬騎從甲寅直符吏入左脅下取病去解説本段大意是突然左脅痛可念肝為青龍用意念導氣至左脅下則病除文中青龍魂神將五營兵千乘萬騎從甲寅直符吏均為道家隱語下段白虎魂神甲申直符吏等同不詳解釋原文二法右脅痛念肺為白虎右目中魂神將五營兵千乘萬騎從甲申直符吏入右脅下取病去脅側臥伸臂直腳以鼻納氣以口出之除脅皮膚痛七息止解説右脅痛可念肺為白虎用意念導氣入右脅下則病除此外採用側身臥位仲展手臂伸直腳用鼻吸氣從口出氣行七息而止這樣還可消除脅部皮膚痛原文三法端坐伸腰右顧視月口納氣咽之三十除左脅痛開目解説