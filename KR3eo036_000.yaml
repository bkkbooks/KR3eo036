痹痛不能行走腰脊疼痛用兩手交叉握固頸項可治毒邪不愈時由腹中行氣使氣大量吐出即愈月亮初出時月亮正中時月亮將落時面向月端正站立不息八通仰頭以意念想象將月光精華之氣吸入口內咽入體內可使陰氣補長婦人吸之可使陰精更加旺盛充實月經調和生殖機能旺盛易於懷孕小結龍行氣法是仿效蒼龍由天空向下低頭注視式故名龍行氣法要點是低頭下視不息十二通最後一段是吸月精法古代養生家認為陰精所奉其人壽月為陰月光為陰華吸之可補人陰精陰精增長可使人長壽婦人屬陰吸之可使陰氣更加旺盛月經通調易於懷孕所以吸月精法和吸日精法是補人陰精陽氣的兩大功法吸月精法練法是仰頭兩眼注視月亮眼不要睜大一邊望月一邊呼吸眼疲勞時可輕輕閉目記住月亮形狀如將消失可睜眼再望以意念想象將月光吸入口內再咽入體內久行即可出現皎潔銀光進入體內臟腑使遍體清涼煩躁漸去進入清靜境界甚至見一團白色光輝懸照當前蕩漾體中七入水法原文入水舉兩手臂不息不沒法向北方箕踞以手掩挽足五指愈伏兔痿尻筋急箕踞以兩手從曲腳入據地曲腳加其手舉尻其可用行氣愈淋瀝乳痛舉腳交叉項以兩手據地舉尻持任息極交腳項上愈腹中愁滿去三蟲利五臟快神氣蹲踞以兩手舉足蹲極橫治氣衝腫痛寒疝疾入上下致腎氣蹲踞以兩手舉足五指低頭自極則五臟氣總至治耳不聞目不明久為之則令人發白復黑正偃臥卷兩手即握不息順腳跟據床治陰結筋脈麻痿纍拘急以兩手還踞著腋下治胸中滿眩手枯反兩手據膝上仰頭象鱉取氣致大黃元氣至丹田令腰脊不知痛手大拇指急捻鼻孔不息即氣上行致泥丸腦中令陰陽從數至不倦以左手急捉髮右手還項出所謂血脈氣各流其根閉巨陽之氣使陰不溢信明皆利陰陽之道也正坐以兩手交背後名曰帶縛愈不能大便利腹愈虛羸坐地以兩手交叉其下愈陰滿以兩手捉繩轆轤倒懸令腳反在其上見愈頭眩風顛以兩手牽反著背上挽繩自懸愈中不轉精食不得下以一手上牽繩下手自持腳愈尻久痔及有腫坐地直舒兩腳以兩手叉挽兩足自極愈腸胃不能受食吐逆解説入水法練功時需舉兩手臂不息行氣此即所謂不傷水的功法不沒法參照入火法按不傷法解釋面向北方箕踞而坐用兩手拉兩腳的五趾可治療大腿痿軟腰骶部筋脈拘急採用屈膝張腳踞坐勢用兩手從腿彎處伸入按地把腳放在手上抬起臀部還可以同時配合行氣能治愈小便淋漓乳痛舉腳交叉向項後用兩手按地舉臀使臀高抬起達到最大限度交兩腳於項上能治療腹中脹滿不適除三蟲疏通內臟暢快神氣採用下蹲勢下蹲時使兩腳儘量近似成為一條直線即所謂的盡力橫蹲並用兩手握住兩腳趾盡力向上提使腳趾離地這種功法能治療氣衝腹腫痛寒疝上下出入使腎氣通暢採用屈膝如坐的蹲踞勢用兩手搬起兩腳的五趾盡力低頭使五臟之氣都達到頭上可治療耳聽不聰目昏視物不明長施這種功法可使白髮重新變黑正仰臥兩手卷成握式閉氣不息行氣沿腿至腳跟止兩腿足依據在床上可治陰結筋脈麻木痿軟或拘攣將兩手鬆開按在腋下治胸中脹滿頭眩手枯萎不用反翻兩手按在膝上仰頭仿鱉仰天引頸吸氣那樣吸氣引氣到中丹田使中丹田元氣到下丹田可使腰脊疼痛消失大黃元氣即中丹田元氣用手大拇指很快地捻鼻孔閉氣不息引氣上行達泥丸腦中可使陰陽順從其數收到強壯健身令人不易疲倦的效果用左手很快地握住頭髮右手環繞從後項出這就是所謂的血脈氣各流其根閉藏太陽經脈之氣使陰氣不外流此功法的確是通調陰陽的有效方法正坐位用兩手交叉在背後名為帶縛能治療大便困難通利腹部並可治療虛勞羸瘕坐在地上用手交叉放在臍下能治療會陰脹滿不適用兩手抓住繩子倒懸在轆轤上轆轤是汲取井水的起重裝置本功法可利用此裝置使腳在上頭在下令身離地用以治療頭暈風癲病用兩手反牽繩於背上拉繩自懸於空中可治愈中焦脾氣不能健運食欲不佳的病症用一隻手在上面牽拉繩另一隻手在下面拉住腳可治愈久痔及尾骶部腫痛坐在地上伸直兩腳用兩隻手交叉挽拉兩腳儘量用力能治療腸胃不能受納飲食嘔吐氣逆小結入水法探討雲笈七籤吸月精法吸月精凡月初時月中時月入時向月正立不息八通仰頭吸月精八咽之令陰氣長婦人吸之陰精益盛子道通凡入水舉兩手臂不息沒悟真篇注疏曰息火謂之沐浴沐浴就是入水潔身這裡凡入水可以理解為吸月精太過致使陰氣偏勝人身如水被浴或似入於水中肢體發冷此時當舉兩手臂不息以引火升陽消散陰氣不使陰氣淹沒陽氣使火滅息王冰説益火之源以消陰翳即是此意本篇入水法入水舉兩手臂不息不沒法就是説練功補陰如入水沐浴後當舉兩手臂不息以引陽升火使水不要淹沒火入水和入火都是練功中的兩大注意事項和原則故本書獨立設題以引人注意鱉取氣法其功法見龜行氣法本段強調此功也可用反兩手據膝仰頭像鱉取氣致大黃元氣至丹田而前法主張衣被蓋口鼻各有所仿效之處土位中央其色正黃色黃而體大故名大黃此處的大黃即中丹田鱉息深長細勻仿效納之則應力求深長使氣由中丹田直至下丹田八寧先生導引行氣法原文寧先生導引行氣之法以除百病令年不老者常心念一以還丹田夫生人者丹救人者還全則延年去則衰朽所以導引者令人肢體骨節中諸邪氣皆去正氣存處有能精誠勤習履行動作言語之間晝夜行之則骨節堅強以愈百病若卒得中風病宿固痹疽不隨耳聾不聞頭眩顛疾逆上氣腰脊苦痛皆可按圖視像隨疾所在行氣導引以意排除去之行氣者則可補於里導引者則可治於四肢自然之道但能勤行與天地相保解説寧先生的導引行氣法可以消除百病延年益壽使人長壽而不早衰該功法的核心是要經常使精神內守使真元之氣歸還於丹田這是因為丹生成人的精氣是生成長養人體的根本而丹的消耗又是使人早衰夭折的源由要想把人體從早衰中挽救出來就要通過修練精神氣使三者合一還歸於丹田保全丹氣則延年益壽消損丹氣則早衰夭折導引術能使人肢體骨節中的各種邪氣都消除而正氣內存如能精心誠意地勤奮學習身體力行動作言語之間白天夜晚都抽空練習就可使骨節堅強百病痊愈如果卒然患了中風病病邪宿留引起痹阻半身不遂耳聾不能聞聲頭眩癲疾咳嗽氣逆腰背疼痛均可按導引圖的繪像根據自己的疾病所在選擇合適的功法行氣導引並以意念引內氣至疾病所在之處排除其疾行氣的作用是可以補里導引的作用是可以治療四肢疾病如能勤於練習遵循自然而為之的道理就能與天地相保健康長壽小結雲笈七籤説寧先生者古之神仙在黃帝之前常遊四海之外昆丘之下有蘭沙之地臥沙百餘年蹶然而起形容復故又曰寧先生者黃帝時人也為陶正能積火自燒而隨煙上下衣裳不灼可見寧先生是古代的養生家之一被道家列為仙人而傳之本篇以簡短語言闡述了道家導引術的基本理論和方法這就是常心念一以還丹田常心念一老子中説道生一一生二二生三三生萬物這裡的一便是指道之根氣之始人要長生當修這一個根本所以管子白心説內固之一可以長久念一就是守一亦稱抱一修一等一即是人的生成精氣即真陰元陽又稱真氣元氣正氣等念一就是精神專注修練真元之氣簡言之就是精神內守與元氣相抱以達到使精氣神三者合一都得到滋養這是古代養生家追求的最高境界因此本文將常心念一作為綱要要求練功者要經常心中想一專心治一以還丹田道家把生成人的先天之精和長養人的後天之精氣包括空氣中的精氣和飲食中五穀之精稱之為丹或金丹認為丹是生成和長養人的根本無上玉皇心印妙經所以説人得丹則靈不得則傾丹在身中非白非青天仙正理指出金丹是真陽元氣仙道以精氣神三元為正藥以練三合一喻名煉藥是理最精微其法最祕密練功修身養性的目的就是為了滋養精氣神使三者合一還歸於丹田之處以延年益壽所謂丹田從根本上理解應是人體藏養生長內丹的土地即真陰元陽出入長養的處所對於丹田部位古今認識不一有臍下一寸一寸二分二寸二寸五分等説有上中下三丹田之説但就其本質不必拘泥於幾寸幾分而應以實際的出入場所為準多數人的真元之氣出入於臍下少腹之中意守丹田時只要一意專注於臍下少腹即可待練到氣還歸丹田産生了感傳現象如氣行氣散感發熱充實感等後便會自然而知其位所以本文最後強調要追求自然之道當練功達到精氣神三者合一使人體內丹復生歸還於丹田後便可救人於不衰不早亡所以文中説生人者丹救人者還全則延年去則衰朽本篇還指出行氣的作用主要在於補里導引的作用主要在於通調肢體補里就是調理在體內的臟腑練功貴在精誠勤習不拘形式活動言談之間白天晚間都可抽出一定時間進行練習初學之人還可根據繪製的導引圖根據病情行氣導引遺憾的是本法的導引圖早已佚散但從長沙馬王堆出土的導引圖來看古人傳授導引之術非常重視繪製動作圖供學者模仿九彭祖谷仙臥引法原文彭祖谷仙臥引法除百病延年益壽居常解衣被臥伸腰填小腹五息止引腎去消渴利陰陽又云伸左腳屈右膝內壓之五息止引脾去心腹寒熱胸臆邪脹挽兩足指五息止引腹中去疝瘕假腹中腫塊利九竅仰兩足指五息止引腰脊痹偏枯令人耳聲聰兩足內相向五息止引心肺去咳逆上氣踵內相向五息止短股徐五絡之氣利腸胃去邪氣掩左脛屈右膝內壓之五息止引肺去風虛令人明目張脛兩足指號五息止令人不轉筋兩手牽膝置心上五息止愈腰痛外轉兩足十通內轉兩足十通止復諸勞凡十節五十息五五二百五十息欲導引常夜半至雞鳴平旦為之禁飽食沐浴解説彭祖的臥式導引法有除百病延年益壽的作用導引時應在清靜居室中松衣解帶仰臥於床進行本導引術共有十節每節以五息為一次每節連做五次每節五息十節計五十息每節連做五次五五共二百五十息導引時間宜在夜半至雞鳴或平旦天大亮的時候導引前禁飽食和洗髮澡身第一節仰臥伸腰先引氣至小腹丹田然後行五息連做五次共呼吸二十五息以後各節均如此進行這樣可引腎中氣行治療消渴調和陰陽第二節伸出左腳彎屈起右膝使右膝內壓左腳上行五息連做五次引脾中氣行可祛除心腹內寒熱邪氣胸膈受邪脹滿不適第三節上體坐起兩臂前舉用手拉兩腳趾行五息連做五次引腹中氣行可治疝氣腹中腫塊並可通利九竅眼耳口鼻七竅加肛門尿道第四節仰臥兩腳十趾伸直後仰行五息連做五次引腰中氣行可治腰脊痹半身不遂並可以使兩耳聽力聰明第六節仰臥伸展兩腿分開兩腳使兩足掌朝內轉足跟向外腳趾相對行五息連做五次引心肺氣行可治咳逆上氣第七節仰臥兩腿併攏踵向內相對腳尖向外伸展行五息連做五次引大腿股內氣行可疏通絡脈經氣五絡當為十五絡脈通利腸胃祛除邪氣第八節仰臥掩關閉停止左脛左腿不動屈曲右膝使右膝著左腿上行五息連做五次引肺中氣行可治療體虛傷風並可使人目明第九節仰臥張開兩脛和兩足趾呼號行氣五息連做五次可治轉筋第十節兩腳向外轉引氣十遍兩腳向內轉引氣十遍可治身體各種勞損疾病以上共十節行二百五十息彭祖是古代著名養生家據班固漢書古今人表記述彭祖姓籛名鏗陸終氏第三子顓頊帝玄孫軒轅黃帝第八代裔孫史記舜本紀説彭祖自堯時舉用歷夏殷封於大彭大彭國即今江蘇徐州至今徐州尚有彭祖宅彭祖井等遺迹彭祖精通養生導引方術年過百歲而不衰葛洪神仙傳説殷代末年彭祖曾傳授養生方術給殷王殷王得彭祖方術後行之見大效於是要殺掉彭祖以斷絶他再傳授於人彭祖得知即不知去向七十年後有人在流河之西見他騎著駱駝在行遊於是道家便列彭祖為仙人莊子逍遙遊説上古有大椿者以八千歲為春八千歲為秋而彭祖乃今以久特聞並指出彭祖是吐詬呼吸吐故納新熊經鳥伸導引之術的創始人孔子在論語述而中説述而不作信而好古竊比我於老彭老彭就是彭祖後世傳為彭祖所述的養生導引方書很多孫思邈備急千金要方等書中收載有許多彭祖的導引論小結本篇導引法有二種較為特殊的行氣法現討論於下引臟腑氣法引腎引脾引肺引心肺引腹引腰脊等都是指以意念引內氣入臟腑肢體以治病的方法佛家的止觀法道家的服氣法都對本法有所論然如童蒙止觀中説安心住在病處即能治病雲笈七籤中説長引吸而咽之存入所患之臟腑若非臟腑之疾是謂肢體筋骨者亦宜先存入所主之臟也閉極又引凡得九咽覺其臟中有氣乃存其氣攻於所苦之處這裡的引吸而咽之存入所患之臟腑覺其臟中有氣乃存其氣攻於所苦之處就是彭祖的引臟腑氣法其練法是要安心住在病處以意念想象納入的內氣到達患病的臟腑或肢體筋骨待練到可感覺到內氣入了臟腑後再引氣攻所患之處即可治療該臟腑或肢體的疾病如引腎氣可攻治消渴引腹中氣可攻治疝氣引腰中氣可攻治脊背痹痛半身不遂等備急千金要方調氣法引彭祖論曰和神導氣之道當得密室避戶安床暖席枕高二寸半正身偃臥瞑目閉氣於胸中以鴻毛著鼻上而不動經三百息耳無所聞目無所見心無所思如此則寒暑不能侵蜂蠆不能毒壽三百六十歲此鄰於真人也每旦夕面向午展兩手於腳膝上徐徐按捺肢節口吐濁氣鼻引清氣良久乃以手左托右托上托下托前托後托瞋目張口叩齒摩眼押頭拔耳挽發放腰咳嗽發陽振動也雙作只作反手為之然掣足仰振數八十九十而止仰下徐徐定心作禪觀之法後閉目存思想見空中太和元氣如紫雲成蓋五色分明下入際漸漸入項如雨初晴云入山透皮入肉至骨至腦氣漸漸下入腹中四肢五臟皆受其潤如水滲入地若徹則覺腹中有聲汩汩然意專思專不得外緣斯須即覺元氣達於氣海須臾則自達於湧泉則覺身體振動兩腳蜷曲亦令床位有聲拉拉然則名一通文中的禪觀之法就是引臟腑氣法出聲調息法第九節的張脛兩足指號五息止就是古代氣功中的另一流派出聲調息法該法和多種氣功家所主張一呼一吸皆不欲令己耳聞其氣出入之聲者不同而是主張隨呼吸出入呼號出聲類似聲音誘導法如先用鼻吸氣呼氣時閉口隨著呼氣用口鼻一起呼號發出哼的共鳴音隨著哼的聲音鼓腹入力丹田可使氣易貫丹田許多練硬氣功的在運氣行功時也常發出阿哈等呼號之聲而在武術中隨功而出的阿哈等聲就更高亢而有力了本來呼吸的本身就帶有一定的聲音發聲有抒懷暢志使氣機流通的作用氣功家利用發出的聲音誘導氣貫丹田或使氣至肢體的某一部位是完全合乎生理的所以古代氣功家在練六字訣呬呵呼噓吹嘻等功法時有人也主張可以隨呼吸呼號某一字或者六字以療疾一般呼號以隨呼氣出聲為宜呼氣時出聲比較自然流暢易於掌握優秀的歌唱家發聲時可使氣貫丹田從而使音色高亢有力洪亮貫耳這也可以説明出聲調息法有它的獨特之處可用於歌唱家話刷演員的練功備急千金要方調氣法引彭祖論曰凡百病不離五臟五臟各有八十一種疾冷熱風氣計成四百四病事須識其相類善以知之冷病者用大呼三十遍細呼七遍呼法鼻中引氣入口中吐氣出當令聲相逐呼字而吐之熱病者用大呼五十遍細吹十遍吹如吹物之吹當使字氣聲似字肺病者用大唏三十遍細唏十遍腎病者用大呬五十遍細呬三十遍此十二種調氣法若有病依此法恭敬用心無有不差彭祖這裡所説的就是發聲呼吸法其方法是鼻中引氣入口中吐氣出使氣與聲相隨而呼氣時發出十王子喬八神導引法原文王子喬八神導引法延年益壽除百病法曰枕當高四寸足相去各五寸手法身各三寸解衣被髮正偃臥勿有所念定意乃以鼻徐納氣以口出之各致其臟所竟而復始欲休先極之而止勿強長息久習乃自長矣氣之往來勿令耳聞鼻無知微而專之長遂推之伏免股胻以省為貴若存若亡為之百遍動腹鳴氣有外聲足則得溫成功成功之士何疾而已喉嚨如白銀鈈一十二重系膺下去得肺其色白澤前兩葉高後兩葉卑心系其下上大下鋭大率赤如蓮花未開倒懸著肺也肝系其下色正青如鳧野鴨頸毛翁頭也六葉抱胃前兩葉高後四葉卑膽系其下如緑綈囊脾在中央亦抱胃正黃如金鑠鑠鮮明然也腎如兩伏鼠夾脊直臍肘而居欲得其居高也其色正黑肥肪絡之白黑昭然胃如素囊念其屈折右曲無汙穢之患肝藏魂肺藏魄心藏神脾藏意腎藏精此名曰神舍神舍修則百脈調邪病無所居矣小腸者長九尺法九州也一云九土小腸者長二丈四尺諸欲導引虛者閉目實者開目以所苦行氣不用第七息止徐徐往來度二百步所卻坐小咽氣五六不差復如法引以愈為效諸有所苦正偃臥披髮如法徐以口納氣填腹自極息欲絶徐以鼻出氣數十所虛者補之實者瀉之閉口溫氣咽之三十所候腹中轉鳴乃止往來二百步不愈復為之病在喉中胸中者枕高七寸病在心下者枕高四寸病在臍下者去枕以口納氣鼻出氣者名曰補閉口溫氣咽之者名曰瀉閉氣治諸病法欲引頭病者仰頭欲引腰腳病者仰足十指欲引胸中病者挽足十指引臂病者掩臂欲去腹中寒熱諸所不快若中寒身熱皆閉氣脹腹欲息者徐以鼻息已復為至愈乃止平坐伸腰腳兩臂覆手據地口徐納氣以鼻吐之除胸中肺中痛咽氣令溫閉目也端坐伸腰以鼻納氣閉之自前後搖頭各三十除頭虛空耗轉地閉目搖之端坐伸腰以左脅側臥以口納氣以鼻吐之除積聚心下不快端坐伸腰徐以鼻納氣以右手持鼻除目晦淚若出去鼻中息肉耳聾亦然除傷寒頭痛洸洸皆當以汗出為度正偃臥以口徐納氣以鼻出之除裡急飽食後小咽咽氣數十令溫寒者使人乾嘔腹痛從口納氣七十所大填腹右脅側臥以鼻納氣以口小吐氣數十兩手相摩熱以摩腹令其氣下出之除脅皮膚痛七息止端坐伸腰直上展兩臂仰兩手掌以鼻納氣閉之自極七息名曰蜀王臺除脅下積聚覆臥去枕立兩足以鼻納氣四四所復以鼻出之極令微氣入鼻中勿令鼻知除身中熱背痛端坐伸腰舉左手仰其掌卻右手除兩臂背痛結氣也端坐兩手相叉抱膝閉氣鼓腹二七或二七氣滿即吐即氣皆通暢行之十年老有少容端坐伸腰左右傾閉目以鼻納氣除頭風自極七息止若腹中滿食飲苦飽坐伸腰以口納氣數十以便為故不便復為之有寒氣腹中不安亦行之端坐使兩手如張弓滿射可治四肢煩悶背急每日或時為之佳端坐伸腰舉右手仰掌以左手承左脅以鼻納氣自極七息除胃寒食不變則愈端坐伸腰舉左手仰掌以右手承右脅以鼻納氣自極七息除瘀血結氣等兩手卻據仰頭目以口納氣因而咽之數十除熱身中傷死肌正偃臥端展足臂以鼻納氣自極七息搖足三十而止除胸足中寒周身痹厥逆偃臥屈膝令兩膝頭內向相對手翻兩足伸腰以口納氣填腹自極七息除痹疼熱痛兩腳不隨覺身體昏沉不通暢即導引兩手抱頭宛轉上下名為開脅踞伸右腳兩手抱左膝頭伸腰以鼻納氣自極七息除難屈伸拜起腦中痛瘀痹踞伸左足兩手抱右膝伸腰以鼻納氣自極七息展左足著外除難屈伸拜起腦中疼一本云除風目晦耳聾正偃臥直兩足兩手捻胞所在令赤如油囊裹丹除陰下濕小便難頽小腹重不便腹中熱但口納氣鼻出之數十不須小咽氣即腹中不熱者七息已溫氣咽之十所踞兩手抱兩膝頭以鼻納氣自極七息除腰痹背痛覆臥傍視兩踵伸腰以鼻納氣自極七息除腳中弦痛轉筋腳痠痛偃臥展兩手外踵指相向亦鼻納氣自極七息除兩膝寒脛骨疼偃臥展兩腳兩手兩踵相向亦鼻納氣自極七息除死肌不仁足脛寒偃臥展兩手兩腳左傍兩足踵以鼻納氣自極七息除胃中食苦嘔踞伸腰以兩手引兩踵以鼻納氣自極七息布兩膝頭除痹嘔也偃臥展兩手兩腳仰足指以鼻納氣自極七息除腹中弦急切痛偃臥左足踵拘右足拇指以鼻納氣自極七息除厥逆疾人腳錯踵不拘拇指依文用之偃臥以右足踵拘左足拇指以鼻納氣自極七息除周身痹病在左端坐伸腰左視目以口徐納氣而咽之數十所閉目目上入病在心下若積聚端坐伸腰向日仰頭徐以口納氣因而咽之三十所而止開目作病在右端坐伸腰右視目以口徐納氣而咽之數十所開目解説王子喬八神臟心肝脾肺腎膽胃小腸稱八神臟導引法有延年益壽祛除百病的功效施功的方法是採用正仰臥姿勢枕頭高為四寸兩足之間相距五寸手與身相距各三寸寬解衣服披髮而臥排除雜念收心定意後即用鼻慢慢吸氣用口呼出用意念依次引氣向各臟到達後再重復進行想要停止應先儘量引氣到達此臟而後方止但不要勉強延長呼吸練功日久功到自成逐漸可使氣息深長呼吸往來時要儘量輕微做到不讓耳聞甚至連鼻子都覺查不到呼吸要細緩柔和均勻深長達到這種地步就可引氣向大腿小腿以感到氣至為佳但又不可用意過強要使氣息和意念達到若存若亡的境界這樣練功百遍可達到腹中大動併發出鳴響連耳朵都能聽到並且足底感到氣至溫暖完成此功法的人即成為什麼病都沒有之人了八神臟的形狀是怎樣的呢大體上講喉嚨氣管就象一條白銀環由十二節復合在一起組成連繫於胸氣管向下所繫的是肺它色白而富有光澤前兩葉高後兩葉低心系在肺下上端大而下端尖鋭宛若紅色未開的蓮花苞倒懸於肺下肝連繫在其下色純青就象野鴨頭頸上的毛由六葉組成圍抱在胃旁前兩葉高後四葉低膽維繫在肝下象緑色的絲囊脾在正中央也圍抱胃顏色正黃如黃金般鮮明腎象兩隻蹲伏的鼠居於脊柱兩側要想知道它的位置高低向下垂直上臂正與肘尖相齊的位置即是腎的顏色純黑外面有白色肥厚的脂肪包絡著白黑分明胃就象一個空淨的囊袋雖説它的形狀向右屈折但不會使食物滯留産生汙穢之患肝能藏魂肺藏魄心藏神脾藏意腎藏精所以五臟是神魂魄意精的住所又叫神舍五臟生理功能正常則百脈調和邪氣疾症無法停留在體內小腸長九尺就象地上有九州一樣另一種説法認為小腸是九土長度為二丈四尺行導引者虛證應閉目實證應開目按疾病所苦的部位行氣不要執守七息即止的方法令氣緩緩往來約二百餘次為限度採用坐位細勻地咽氣五六遍若仍無療效再反復使用這種方法直至病苦消失為止病者練功時可採用仰臥位披髮如前面説的方法行氣即緩慢地用口納氣引入腹內儘量使納氣深長但又要讓氣息細微達到輕微欲絶的狀態緩慢地用鼻呼氣約數十遍要遵循虛者補之實者瀉之的原則閉口暖和氣息令氣變溫咽下去約三十遍待到腹中有轉動鳴響時停止這樣往來行氣約二百餘次病不愈即反復行這個功法病在喉中胸中的枕高七寸病在心下的枕高四寸病在臍下的不用枕頭平臥呼吸的方法是以鼻吸氣口呼氣者為補以閉口暖和氣息令氣變溫咽下去的方法為瀉閉氣治各種病的方法是要導引頭部的病仰起頭要導引腰部腳上的病仰起足十趾要導引胸中的病挽拉足十趾要導引臂部的病可用兩手掩按兩臀要治療腹中寒熱多種不適的症候如中寒身熱都可採用閉氣而鼓腹的方法想要呼氣時緩緩地用鼻吐氣這樣呼氣後再重復前面的功法直到痊愈為止平坐伸腰腳放平兩臂伸直兩手按地用口緩緩吸氣鼻出氣可治療胸中肺中痛咽氣要柔和讓氣溫並閉目採用端正坐位伸直腰部用鼻納氣閉氣不息從前從後搖頭各三十次可治療頭部空虛精氣不足頭眩欲倒要閉目搖頭端正地坐著伸直腰部然後向左脅側臥用口吸氣鼻出氣可消除積聚和心下不適端正坐位伸腰緩緩地用鼻吸氣並用右手捻鼻可治眼目昏暗或淚常出等症還能消除鼻中息肉耳聾又治傷寒頭痛灑灑惡寒施用此法要以汗出為度正仰臥用口緩緩吸氣以鼻呼出能治脘腹拘急不適飽食後應慢慢小咽氣約數十次達到有溫暖感為宜寒證使人乾嘔腹痛者用口吸氣約七十次以氣充實腹部可收到治療效果向右脅側臥以鼻吸氣從口中慢慢吐出約數十次並用兩手相摩至掌熱用熱掌按摩腹部讓氣從下面排出能消除脅部皮膚痛呼吸七息止端正坐位伸腰向上伸直兩臂兩手掌上仰用鼻吸氣後閉氣不息儘量延長到極限為止如此行七次這種功法叫蜀王臺能消除脅下積聚伏臥勢去掉枕頭豎立兩足以鼻吸氣十六餘次用鼻呼出吸氣時要使氣盡量輕微做到幾乎連鼻都感覺不到可消除身中熱背部疼痛正坐位伸直腰舉左手仰掌垂右手掌心向下能祛除兩臂及背痛氣滯鬱結端坐位兩手交叉抱膝閉氣不息鼓起腹部十四次或十四次氣滿即吐氣可以使氣機通暢堅持此功法十年可使老年人貌如少年端坐位伸直腰向左右傾斜身體閉眼用鼻吸氣儘量深吸七次止可祛除頭風如果腹中脹滿飲食後苦於作飽可正坐伸直腰用口連續吸氣數十次以感到脹飽消失為止如腹中又脹滿可再用此法腹中有寒氣不適也可以用此功法端坐位將兩手做出好象拉滿弓射箭的姿勢可治四肢煩悶不舒背部拘急每天或時常練此法效果更好正坐伸腰舉右手仰掌向上用左手托左脅以鼻吸氣盡力吸七次可治療胃寒飲食不消化正坐伸腰舉左手仰掌向上用右手托右脅用鼻吸氣盡力吸七次可消除瘀血與結氣兩手向後按地仰頭抬眼用口吸氣咽數十次可除熱治療身中傷並消除死肌正身仰臥端正伸展兩腳兩臂用鼻盡力吸氣七次搖腳三十次而止可消除胸寒足冷周身痹痛厥逆仰臥屈膝讓膝頭向內靠攏相對手與膝對兩足翻轉伸直腰用口吸氣以氣充實腹部盡力吸氣七次能祛除痹痛高熱兩腳運動不便如感覺身體沉重頭昏氣血不通暢亦可行導引法用兩手抱頭上下展轉名叫開脅踞坐伸右腳兩手抱左膝頭伸直腰用鼻吸氣盡力吸七次可治療下肢難以屈伸跪拜起立腦中疼痛瘀阻不通麻木踞坐伸左腳兩手抱右膝頭伸腰用鼻吸氣盡力吸七次伸左足外展可消除下肢難以屈伸拜起腦中疼另一書上説可以消除頭風目昏耳聾正仰臥伸直兩腳用兩手按捏膀胱所在的部位捏到皮膚髮赤好象油袋裹赤丹一樣可消除陰部潮濕小便難小腹重大便不下腹中熱只要口吸氣鼻出氣行數十遍不需要小咽氣即使腹中不熱者七息即可口中溫氣咽下十次踞坐用兩手抱膝頭以鼻吸氣盡力吸七次可消除腰痹背痛俯臥兩眼傍看兩腳後跟伸腰用鼻吸氣盡力吸七次可消除腳中弦痛轉筋腳痠痛仰臥伸展兩手外展足根足趾相對也用鼻吸氣盡力吸七次可消除兩膝寒冷小腿骨疼痛仰臥伸直兩腳兩手兩足跟相對也用鼻吸氣盡力吸七次可治療肌肉癱瘓麻木不仁小腿寒冷仰臥伸展兩手和兩腳向左停放兩腳跟用鼻吸氣盡力吸七次可消除胃中不適食後苦於嘔吐踞坐伸腰用兩手牽引兩腳後跟用鼻吸氣盡力吸七次再用兩手放兩膝頭上能除痹止嘔仰臥伸展兩手兩腳仰起足趾用鼻吸氣盡力作七息可消除腹中拘急劇痛仰臥用左腳跟勾住右腳拇趾用鼻吸氣盡力吸七次可治療厥逆因疾病不能施此功者可將腳跟交錯不勾拇趾並依照前面所説的方法吸氣仰臥用右腳跟勾住左腳拇趾用鼻吸氣盡力吸七次可消除周身麻木病在左面端正坐伸腰向左看並用口緩緩吸氣而咽下約數十遍咽氣時要閉目目要向上內視患心下積聚之病應端正坐伸腰仰頭向日慢慢以口吸氣咽下約三十次而止宜開目行功病在右側正坐伸腰向右看並用口慢慢吸氣緩緩咽下數十次開目行功小結王子喬古代氣功家雲笈七籤中記載王子喬者河東人也漢明帝時為尚書郎出為葉縣令漢法畿內長吏節朔還朝每見子喬先生至不見有車馬迹而怪之明帝密使星官占候輒見雙鳧從東南飛來乃羅得一隻履時人異之王子喬導引法雖有三十四節但其精華是八神導引法所謂八神這裡指的是心肝脾肺腎膽胃小腸肝藏魂肺藏魄心藏神脾藏意腎藏精為人身神之所居故名神舍神臟臟者藏象之所也膽與肝相表裡為魂出入之路小腸與心相表裡為神出入之路胃與脾相表裡為意出入之路故王子喬將其歸結在一起稱為八神臟並對八神的大體形態顏色位置長短大小作了概括