有疾病可在呼氣時默讀呼字以治療噓字配屬於肝肝開竅目所以古人説肝氣過盛即目赤疼痛肝有疾病可在呼氣時默讀噓字以治療吹字配屬於腎腎開竅於耳所以古人説腎虛則耳聾腎有疾病可在呼氣時默讀吹字以治療嘻字配屬於三焦三焦有疾病可在呼氣時默讀嘻字以治療小結呼吸時配合默讀口訣治病的鍛鍊方法首載於梁代陶弘景養性延命録納氣有一吐氣有六納氣一者謂吸也吐氣有六者謂吹呼唏呵噓呬皆出氣也凡人之息一呼一吸元有此數欲為長息吐氣之法時寒可吹時溫可呼委曲治病吹以去風呼以去熱嘻以去煩呵以下氣噓以散滯呬以解極後世將六字又配屬於五臟和三焦以及四季如隋代智兜述修習止觀坐禪法要六字配屬五臟歌訣説心配屬呵腎屬吹脾呼肺呬聖皆知肝臟熱來噓字至三焦壅處但言嘻本書二十七老人門引修真書六字配屬四季歌訣説春噓明目木扶肝夏至呵心火自闌秋呬定知金肺潤腎吹惟要坎中安三焦嘻卻除煩熱四季長呼脾化餐切記出聲聞口耳其功尤勝寶神丹至於六字訣的具體練法和主治功能本書二十七老人門有詳細論述十五消渴門原文一法睡臥勿張口久成消渴及失血色赤松於云臥閉目不息十二通治飲食不消解説人睡臥時不要張口否則日久會引起消渴病及使顏面失去血色赤松子説臥閉眼不息十二通可治飲食不消化原文二法解衣倓談安靜臥伸腰䐜小腹五息止引腎去消渴利陰陽解衣者使無挂礙倓臥者無外想使氣易行伸腰使腎無逼蹙䐜者大努使氣滿小腹者即攝腹牽氣使五息即為之引腎者引水來咽喉潤上部去消渴枯稿病利陰陽者饒氣力此中數虛要與時節而為避初食後大飢時此二時不得導引傷人亦避惡日時節不和時亦避導已先行一百二十步多者千步然後食之法不使大冷大熱五味調和陳穢宿食蟲蠍余殘不得食少眇著口中數嚼少湍咽食已亦勿眠此名谷並與氣和即真良藥也解説赤松子古代氣功家相傳漢高祖劉邦的謀士張良曾跟隨赤松子學導引辟穀術於天門山赤松子吃首烏黃精教張良行眼觀鼻鼻對臍雙肘壓期門等導引術雲笈七籤卷五十九有赤松子服氣經序一篇序曰天道悠長萬品不齊人生為貴陰陽同階天道坦坦修之不迷故曰休糧絶食為生道陰陽還精為重寶能常行之永壽考何為恣欲自使老千金送葬無億兆悲呼哭泣自懊惱豈若無為為服氣好修之不釋升天列仙傳説赤松子者神農時雨師服水玉以教神農能入火自燒這完全把人神仙化了據史書記載來看赤松子是漢代氣功家曾為張良之師是確有其事的解開衣服安靜而臥伸腰使氣沉小腹五息止引氣入腎中可除消渴調和陰陽解衣是使導引時氣行不受阻礙靜臥是使心中沒有妄想氣容易在體內運行伸腰是為了使腎臟不受壓迫䐜腹者是吸氣使氣至丹田令小腹脹滿此時收腹聚氣五息方止引腎是引腎水到咽喉潤澤上部以祛除消渴枯稿病調和陰陽可使人氣力健旺在導引中如出現虛弱現象就要根據時節而進行避忌剛剛進食之後和過度的飢餓時這兩個時候不能進行導引因其會損傷人體還應避開不好的日子及時辰節令不和的時候導引完畢要先步行一百二十步多者可行一千步然後進食進食不要太冷太熱要五味調和陳腐的隔夜食物蟲蠍吃過的剩餘食物都不能吃進食時要小口細嚼慢咽食後不要立即睡覺這就叫谷藥再加上氣和可謂真正的良藥了小結本節重點討論練功時姿式和意義以及注意事項與飲食禁忌所述甚詳不另再議十六脹滿門原文一法蹲坐住心卷兩手發心下左右手搖臂遞互欹身盡膊勢卷頭築肚兩手衝脈至臍下來去三七漸去腹脹肚急悶食不消化解説蹲坐收心定意捲曲兩手從心向下然後左右搖動兩臂交替側斜身體兩肩儘量用力低頭向肚兩手沿衝脈按到臍下上下反復二十一次可逐漸去肚腹脹悶食不消化原文二法腹中若脹有寒以口呼出氣三十過止解説腹中若是脹滿有寒氣以口呼氣三十次為止原文三法若腹中滿食飲苦飽端坐伸腰以口納氣數十滿吐之以便為故不便復為之有寒氣腹中不安亦行之解説如果腹中脹滿食後苦於作飽可正坐直腰用口吸氣數十次氣吸足後吐出以所苦消失為止以後脹飽時仍可再行此法如有寒氣腹內不適也可以施行此法原文四法端坐伸腰口納氣數十除腹滿食飲過飽寒熱腹中痛病解説正坐伸腰口吸氣數十次可消除肚腹脹滿飲食過飽作脹惡寒發熱腹中痛等病原文五法兩手向身側一向偏相極勢發頂足氣散下欲似爛物解散手掌指直舒左右相皆然去來三七始正身前後轉動膊腰七去腹肚脹膀胱腰脊臂冷血脈急強悸也解説兩手伸向身體一側盡力側轉並行氣使氣從頭頂下散腳以意念想象就如腐爛的東西那樣使氣散開手掌手指伸直左右相同來回做二十一次然後轉正過身來前後轉動肩臂和腰部七次可祛除肚腹作脹膀胱腰脊和臂部寒冷血脈急強悸動等病原文六法若腹內滿飲食善飽端坐伸腰以口納氣十以便為故不便復為解説見本篇第三法原文七法脾主土暖如人肉始得發汗去風冷邪氣若腹內有氣脹先須暖足摩上下並氣海不限遍數多為佳始得左回右轉三七和氣如用腰身內一十五法回轉三百六十骨節動脈搓筋氣血布澤二十四氣和潤臟腑均調和氣用頭搖振手氣向上心氣向下分明知去來莫問平手欹腰轉身摩氣蹙回動盡心氣放散送至湧泉一一不失氣之行度用之有益不解用者疑如氣亂解説脾在五行屬土土氣溫暖人體便能發汗汗出可祛除風冷邪氣若腹內有氣作脹要先溫暖兩腳並按摩肚臍上下和氣海次數不限越多越佳至少要左回右轉二十一次要使氣平和當用腰身內一十五法回轉三百六十骨節血脈流動筋骨通利氣血布澤各臟腑就可使二十四氣調和臟腑協調要使氣和須知用氣之法頭要轉動搖振以意念引手氣上行心氣下行使上下來去分明不論是平手斜腰轉身按摩行氣動作結束都要使心氣放散送至湧泉每一個動作都要依法而行不能失氣運行的規律氣不失度用之有益氣若失度可致氣亂小結本篇對腹脹提出了搖手臂轉體以手沿腹正中衝脈上下按摩的動功和以口吸氣滿吐之存思使氣從頭頂向下散布至腳如腐爛東西那樣鬆散和自然地使氣下行的靜功這兩種功法均有理氣舒腹健脾除滿的作用強調練功時要以便為故不便復為堅持反復練習才能收到良效對呼吸主張以口納氣口呼氣為主以口大幅度的深呼吸可使腹內充分受氣脹滿消除最後一條又強調指出治脹要先理脾理脾消脹可先暖足摩腹活動腰內搖頭後以意引手氣向上心氣向下氣血和調中焦得通則脹自除引氣時要使上下來去分明各循其經心氣始終要鬆散自如如此則氣可行送於湧泉引氣一定要依法而行不失其度方可有益若失其度反而會使氣亂引起頭昏目眩胸悶腹脹等不良反應十七眼目門原文一法踞伸右腳兩手抱左膝頭伸腰以鼻納氣自極七息除難屈伸拜起去脛中痛痹風目耳聾解説見一中風門第七法原文二法踞伸左腳兩手抱右膝伸腰以鼻納氣自極七息展左足著外除難屈伸拜起去脛中疼一本云除風目暗耳聾解説見一中風門第九法原文三法以鼻納氣左手持鼻除目暗泣出鼻納氣口閉自極七息除兩脅下積血氣解説用鼻吸氣時左手按鼻可消除目昏流淚用鼻吸氣時閉口盡力行氣七息可消除兩脅下瘀血積氣原文四法端坐伸腰徐以鼻納氣以右手持鼻除目暗淚若出閉目吐氣鼻中息肉耳聾亦然除傷寒頭痛洗洗皆當以汗出為度解説正坐位伸腰緩緩用鼻吸氣用右手按鼻閉目用口呼氣能消除目昏流淚鼻中息肉耳聾也可用同法治療若治傷寒後頭痛灑灑惡寒當以汗出為度原文五法蹲踞以兩手舉足五趾頭自極則五臟氣遍至治耳不聞目不明久為之則令發白復黑解説踞坐用兩手搬舉兩足五趾盡力低頭行氣使五臟之氣到達頭部則可治耳不能聞聲目昏暗不明久行此法可使白髮變黑原文六法仰兩足趾五息止引腰背痹偏枯令人耳聰久行眼耳諸根俱無挂礙解説見一中風門第二法原文七法伸左脛屈右膝納壓之五息止引肺去風虛病令人目明依經為之引肺中氣去風虛病令人目明夜中見色與盡無異解説見十四補益門彭祖谷仙臥引法原文八法雞鳴以兩手相摩令熱以尉目三行以指抑目左右有神光令目明不病痛解説雞鳴時兩手互相摩擦使熱然後用熱手按摩尉眼如此三次再用手指按摩兩眼可使兩眼有神眼明亮不生病痛原文九法東向坐不息再通以兩手中指口唾之二七相摩拭目令人目明以甘泉漱之洗目去其翳垢令目清明上以內氣洗身中令內睛潔此以外洗去其塵障解説面向東坐不息兩通口唾兩手中指十四次然後兩指相摩使熱用以揩眼可使人眼睛明亮用唾液漱口後洗眼可去目翳和眵垢使眼睛清爽明亮練功到一定程度可以使內氣上引洗身心中間引而入眼底使眼內潔明外邊再用唾液洗去眵垢翳障效果就更好原文十法臥引為三以手爪項邊脈五通令人目明臥正偃頭下卻亢引三通以兩手指爪項邊大脈為五通除目暗患久行令人眼夜能見色為久不已通見十方無有際限解説臥位引氣三次用手抓後項旁的筋脈五次可使眼睛明亮仰臥正身頭低下向上用力牽引三次用兩手指抓後項旁的大筋脈五次可消除目暗之病久行此法可使人眼睛在夜裡能分辨顏色久做不斷可以看到遠方沒有極限原文十一法雞鳴欲起先屈左手啖鹽指以指相摩咒曰西王母女名日益愈賜我目受之於口即精摩形常雞鳴二七著唾除目茫茫致其精光徹視萬里遍見四方咽二七唾之以熱指摩目二七令人目不瞑解説雞叫即起床先屈左手拿鹽少許啖同啖噉吃或給人吃入口內以唾液相合然後將鹽唾液用兩手指相互摩擦念咒語西王母女名曰益愈賜我目受之於口用兩手指按摩兩目如常能在雞鳴時著鹽唾液按摩兩目十四次可治目茫茫視物不清使其恢復精光能視遠物甚至徹視萬里遍見西方此外還可以採用咽唾十四次以兩指著唾液不加鹽相摩使指熱擦目十四次的方法此法也可以使人眼目不昏暗小結本篇除介紹了幾種常用的導引功外重點講述了眼的保健功功法有手掌按摩法如雞鳴以兩手相摩令熱以尉目手指按摩法如以指抑目左右有神光令目明不病痛唾液著指按摩法如以兩手中指口唾之二七相摩拭目咽二七唾之以熱指摩目二七以鹽與唾液混合後著指按摩法如先屈左手啖鹽指以指相摩即精摩形以兩手提抓項後大筋這些功法簡單實用對防治近視眼及老年性眼病有較好效果現代的眼保健操大多都採用了這些功法十八喉舌門原文一法一手長舒合掌仰一手捉頦挽之向外一時極勢二七左右亦然手不動兩向側極勢急挽之二七去頸骨急強頭風腦旋喉痹膊內冷注偏風解説一手伸長手掌向上另一手握住下巴向外拉連續盡力作十四次左右都這樣作然後手不動向左右兩側儘量轉動作快速牽拉動作十四次可祛除頸椎活動障礙頭痛腦旋喉痹臂肩冷注偏風原文二法兩手拓兩頰手不動摟肘使急腰內亦然住定放兩肋頭向外肘膊腰氣散盡勢大悶始起來去七通去喉痹解説兩手托著兩頰手不動將兩時用力靠攏摟緊腰部腰部同手一樣不動然後兩肘頭抬起向外使肩肘腰氣散盡感到大悶時稍息再做反復七遍可治喉痹小結本篇功法以活動頭項和肘肩為主具有理氣通痹功效十九口齒門原文一法常向本命日櫛發之始叩齒九通陰咒曰太帝散靈五老返真泥丸玄華保精長存左回拘月右引曰根六合清練百疾愈因咽唾三過常數行之使齒不痛發牢不白頭腦不痛解説經常在本命之日與人生干支相值的日梳髮洗面之前上下齒相叩九次口中念陰咒太帝散靈五老返真泥丸玄華保精長存左回拘月右引曰根六合清練百疾愈因然後將口中唾液咽下三次經常這樣練功可使齒不痛發不脫落不變白頭腦不痛注本法咒語屬道家隱文練功時可以不念原文二法東向坐不息四通上下琢齒三十六治齒痛解説面向東坐不息四通叩齒三十六次能治齒痛原文三法凡人覺脊背皆倔強不問時節縮咽膊內仰面努膊並向上頭左右兩向按之左右二七一住待血行氣動定然始更用初緩後急不得先急後緩若無病人常欲得旦起午時日沒三辰如用辰別二七除寒熱病脊腰頸項痛風痹口內生瘡牙齒風頭眩終盡除也解説本法與第二篇風痹門最後一段大致相同解説見前文小結本節論述了以叩齒咽唾不息為主的口齒保健功功法詳解請參見八癆瘵門二十鼻門原文一法東向坐不息三通手捻鼻兩孔治鼻中患交腳踑坐治鼻中患通腳癰瘡去其涕唾令鼻道通得聞香臭永行不已徹聞十方解説向東坐定閉氣不息三通用手捻兩鼻孔可治療鼻中疾患兩腳交叉盤坐也可治鼻中疾患並治腳上的癰瘡還可去除涕唾使鼻道通暢能辨香臭久行此功可使嗅覺靈敏原文二法踞坐合兩膝張兩足不息五通治鼻瘡解説蹲坐合攏兩膝張開兩腳閉氣不息五通可治鼻瘡原文三法端坐伸腰徐徐以鼻納氣以右手捻鼻除目暗淚苦出徐徐閉目吐氣鼻中息肉耳聾亦能除傷寒頭痛洗洗皆當以汗出為度解説見十七眼目門第四法原文四法東向坐不息三通以手捻鼻兩孔治鼻中息肉解説見本篇第一法前半部分小結本節對鼻病保健提出了以手捻鼻兩孔以右手捻鼻和不息三通等功法詳解見十四補益門二十一耳門原文一法坐地交叉兩腳以兩手從曲腳中入低頭叉項上治久寒不能自溫耳不聞聲解説坐在地上交叉兩腳用兩手從腳彎中伸入低頭把手交叉放在項上可以治療久寒不能自己轉溫耳不聞聲原文二法腳著項上不息十二通必愈大寒不覺暖熱久頑冷患耳聾目眩久行即成法法身五六不能變解説把腳放在後項上不息十二通可治愈大寒不覺暖溫頑固冷疾耳聾目眩應堅持久行使其成為常用導引法以此法健身每次作三十次不宜改變小結本篇以坐地交叉兩腳以兩手從曲腳中入低頭叉項上和腳著項上不息十二通二種功法治療耳病但功法較難特別以腳著項上不易練習可結合鳴天鼓等功二十二遺泄門原文一法治遺精白濁諸冷不生戍亥間陰旺陽衰之際一手兜外腎一手搓臍下八十一次然後換手每手各九次兜搓九日見驗八十一日成功解説治療男性遺精白濁腎陽不足虛寒不能生精種子可在戍亥時晚時陰氣旺盛而陽氣衰弱之際用一手兜陰囊一手搓擦臍下丹田處八十一次然後換手兩手各搓擦九次九日即可見效八十一日即可治愈原文二法治遺精以床鋪安短窄臥如弓彎二膝並臍縮或左或右側臥用手托陰囊一手伏丹田切須寧心淨臥戒除房室思欲之事若固不泄可保身安解説治療遺精可以將床鋪設得短些曲蜷臥在窄小床面上使形如彎曲的弓也可將兩膝曲到臍部或左或右側臥用手托兜陰囊一手按在臍下丹田戒除思欲房室性事這樣可使精固不泄身心安康不再遺精小結本篇對遺精提出兩種導引法一法是兜陰囊擦丹田行九陽之數以壯陽補精後世有口訣曰一擦一兜左右換手九九之功真陽不走實踐證明本法具有固精補腎調理陰陽治療遺精早泄陽痿和男子無精症等作用近千年來一直廣為流行在各家導引術中是行之有效的固精術另一法是側臥屈腿托陰囊按丹田法本法強調治療遺精必須平日採用側臥睡位這是十分正確的仰臥俯臥位易使陰莖受到壓迫而勃起是引起夢遺的常見原因而側臥屈腿將陰囊托起就可以減少受壓和兩腿擦磨因此而防止遺精作者在最後強調指出防治遺精還務必寧心定志戒除思欲各種性事只有這樣才能使精固不泄身心安康這種重視心理治療的觀點確是防治遺精的原則只有節制性生活戒除手淫等才能保證導引術的成效行本導引功時還應配合吸呼行氣意守丹田則功效更好二十三淋門原文一法偃臥令兩足應為手布膝頭斜踵置尻口納氣振腹鼻出氣去淋數小便解説仰臥曲腿將兩手放在膝頭腳跟儘量傾靠臀尾部口吸氣鼻出氣使氣達腹內腹隨呼吸上下起伏振動可治淋症小便頻數原文二法蹲踞高一尺許以兩手從外屈膝內入至足趺上急手握足五指極力一通令內曲以利腰髖治淋解説蹲踞抬臀使臀部離開地面一尺左右用兩手從外側經膝彎下由小腿內側到足背上立即用兩手各握一腳的五趾盡力握一次使腳趾向內彎曲可以通利腰髖治淋原文三法偃臥令兩足應為手布膝頭斜踵置尻口納氣振腹鼻出氣去石淋莖中痛解説本條及第五條與第一法基本功法相同原文四法以兩踵布膝除癃解説將兩腳跟交替放置膝頭可以治療排尿困難甚則小便閉塞不通原文五法偃臥令兩足應為手布膝頭取踵置尻下以口納氣腹脹自極以鼻出氣七息除氣癃數小便莖中痛陰以下濕小腹痛膝不隨解説仰臥兩手放兩膝頭兩足跟靠置臀尾下部以口吸氣使氣達腹內儘量使腹覺脹滿充實即氣沉丹田以鼻出氣吸呼行氣七息可以消除氣癃小便頑數尿道疼痛會陰下濕潤不適小腹疼痛膝不能活動自如小結本篇第一三五法大致相同均取仰臥曲腿手放膝頭足放臀部的體位這種體位可以使全腹及會陰部充分放鬆減輕行氣時可能引起的尿道及膀胱不適是淋症導引比較舒適的姿式呼吸法以腹式法為主強調振腹脹腹使氣達丹田入腎而調理膀胱所以再三述之可見是治淋症的主要導引法其次還可採用蹲抬臀部用雙手經膝脛握固五腳趾用力握拉腳趾法這種功法可以通利腰髖使下焦得到調理所以也利於淋症的康復另一種以兩腳交替放置膝部的功法可以使下肢氣血流通膀胱舒利故可以治小便閉塞不通二十四二便不通門原文一法正坐以兩手交背後名曰帶便愈不能大便利腹愈虛羸反叉兩手著背上推上使當心許踑坐反倒九通愈不能大小便利腹愈虛羸也解説正坐兩手交叉在背名為帶便可治療不能大便使腹內通利並可治虛勞羸瘦反叉兩手放背上將手向上推正對心上下兩腳伸直岔開而坐頭身向後反倒九次可治療不能大小便便腹內通利並可治虛勞羸瘦原文二法龜行氣伏衣被中覆口鼻頭面正臥不息九通微鼻出氣治大便閉塞不通解説行龜行氣法藏身在衣被中覆蓋口鼻頭面正臥不息九通微微由鼻孔出氣可治療大便閉塞不通原文三法偃臥直兩手捻左右脅除大便難腹痛腹中寒口納氣鼻出氣溫氣咽之數十病愈解説仰臥伸直兩手搓捻左右脅部可消除大便難腹痛腹中寒口吸氣鼻出氣口中溫氣咽數十次病即痊愈小結二便不通是指大便和小便排出困難祕結不通但從本節所述來看主要是指大便排出困難本篇採用按摩和氣功綜合防治便祕按摩及呼吸法有帶便法方法是正坐兩手交叉在背部正對心上下頭身向後斜傾龜行氣法方法是如龜藏身衣被中覆蓋口鼻頭面仰臥不息使氣由鼻細勻而出入按摩兩脅法按摩兩脅及腹部並口納氣鼻出氣使氣在口內停一會兒受溫後而吞咽入胃腸內二十五疝氣門原文一法挽兩足趾五息止引腹中氣去疝瘕利孔竅解説用手握拉兩足趾行氣五息而止引氣達腹中使腹中氣動可以消除疝氣腹中結塊使大小便通利原文二法坐舒兩腳以兩手捉大拇趾使足上頭下極挽五息止引腹中氣遍行身體去疝瘕病利諸孔竅往來易行久行精爽聰明修長解説坐地舒展兩腳用兩手握捉足兩大拇趾使足上抬頭下低儘量牽拉行氣五息而止使氣達腹中再引腹中氣使遍行身體這樣可以治疝瘕病使九竊通利如此反復行之久行可使人精神爽朗聰明而俊秀小結本篇以用手握兩足大拇趾行氣引腹中氣使遍行身體的方法治療疝氣方法簡單行之尚有使人精神爽朗聰明俊秀等作用二十六諸痔門原文一法惟高枕偃仰心平氣定其腫自收解説仰臥將枕放高心平氣定的調息可使痔瘡腫痛自行消散原文二法一足踏地一足屈膝兩手抱犢鼻下急挽向身極勢左右換易四七去痔五勞三里氣不下解説一腳踏在地上另一腿曲膝兩手抱膝頭犢鼻下盡力向身體腹部拉左右交換各作二十八次可祛除痔瘡五癆病和足三里經氣不能下行原文三法踞坐合兩膝張兩足不息兩通治五痔解説踞坐合攏兩膝張兩腳不息兩遍治療五痔原文四法兩手抱足頭不動足向口受氣衆節氣散來去三七欲得捉左右側身各急挽腰不動去四支腰上下髖內冷血冷筋急悶痔解説兩手抱腳頭不動不息行氣把腳對著口接受出氣直到全身各骨節氣散共做二十一次然後用兩手捉腰左右側身用力拉腰保持不動可去除四肢腰上下骨髓內冷血冷筋急悶痔原文五法兩足相踏向陰端急蹙將兩手捧膝頭兩向極勢捧之二七竟身側兩向取勢二七前後努腰七去心勞痔病解説兩腳掌對踏向前陰處緊靠用兩手捧膝頭左右兩邊都儘量用力捧十四次完畢後身體向兩側擺動十四次再前後活動腰部七次可祛除心勞痔瘡膝冷小結本篇以動靜結合的導引法治痔痔腫痛期應臥床休息安心定意勿躁急活動摩擦局部其腫自然可消平時防治痔應多活動肢體或一腳踏地一足曲膝或兩手捉足頭不動以口對足受氣然後用兩手按腰左右側身或合攏兩膝張兩腳不息行氣或兩腳對踏靠前陰處用力抱膝頭然後向兩側擺動身體這些功法可疏通氣血松腰放胯使直腸肛門局部血循得致改善若能再結合提肛則療效更好所謂提肛就是有意識的向上收縮肛門使肛門括約肌一收一放的活動有良好防治痔瘡作用備急千金要方中有肛門常宜撮氣功練習多主張收肛或提肛不僅可以防治痔瘡而且有使內氣收斂貫注於脊中等作用一般早晚各行三十次二十七老人門一修真書六字訣原文春噓明目木扶肝夏至呵心火自間秋呬定知金肺潤腎吹惟要坎中安三焦嘻卻除煩熱四季長呼脾化餐切記出聲聞口耳其功尤勝寶神丹解説修真書中有一首六字配屬四季及臟腑的口訣噓字配屬肝和春春季吐納時默讀噓可以使肝木疏達眼目明亮呵字配屬心和夏夏季吐納時默讀呵可以使心火收藏心平氣靜呬字配屬肺和秋秋季吐納時默讀呬可以使肺氣滋潤不為秋燥所傷吹字配屬腎和冬冬季吐納時默讀吹可使腎陽腎中火即腎陽配屬八卦中坎卦收藏腎氣安寧嘻字配屬於三焦四季吐納時默讀嘻可以使三焦運行無阻消除煩熱呼字配屬脾和四季四季吐納時默讀呼可使脾胃運化功能旺盛消化吸收正常行六字訣一定要心中默讀切忌將字讀出聲使耳聽見這種練功法的作用很好優勝於服用神丹妙藥原文訣云肝若噓時目睜睛爭知肺呬手雙擎心呵腦後高叉手腎若吹時抱膝平脾用呼時須撮口三焦客熱臥嘻嘻四季常是噓八節不得吹益肝為相火有瀉無補腎為真水有補無瀉也解説進行六字呼吸鍛鍊時也可以配合這首口訣中的動作將呼吸默讀與肢體運動結合起來進行方法是默讀噓時要睜大眼睛默讀呬時要把雙手向上托舉呵時可將兩手舉起交叉腦後吹時可兩腿下蹲用兩手抱膝呼時要將口唇微收嘻時要躺臥在床而行注意事項是春夏秋冬四季經常適宜進行噓字鍛鍊立春春分立夏夏至立秋秋分立冬冬至這八節之時不得進行吹字鍛鍊這是因為八節是生長收藏之始寒暑之極陰陽之和此時煉吹易於傷腎肝臟寄藏著能溫養全身推動臟腑功能活動的相火肝性喜條達宜常疏通宣泄不宜抑鬱填補所以説肝為相火有瀉無補腎主藏精精又可稱為真水元陰由父母先天之精和後天飲食之精合成是人體生長發育生殖的本源宜經常滋補更其充實不可伐瀉使其不足所以説腎為真水有補無瀉原文肝噓主嗌咽喉干面塵面青無華眼眵赤多淚疼痛脅下痛小便黃赤色或澀小便不利心呵主煩燥喉瘡熱腫多汗掌中熱咽乾渴脾呼主熱痰涎目黃喉痹鼻衄口乾舌痛身重腹脹肺呬主喘嗽煩渴胸膈煩悶有痰掌中熱風汗出腎吹主有疾尪羸尪汪羸尪贏瘠病瘦弱面黑口乾耳鳴咽嗌腫股內疼痛足下熱痛三焦嘻主頰痛喉痹耳閉渾渾然以上主治六經本病之邪也然五臟不足又在藥食氣味為補經云形食味故味歸形氣食形故形歸氣氣化則精生味和則形長故五味為宜若五志所過非藥可治者五勝為宜憂勝怒肝屬木在志為怒過節則反自傷故曰怒傷肝故以所勝者制之恐勝喜心屬火在志為喜過節則反自傷故曰喜傷心故以所勝者制之怒勝思脾屬土在志為思過節則反自傷故曰思傷脾故以所勝者制之喜勝憂肺屬金在志為憂過節則反自傷故以所勝者制之思勝恐腎屬水在志為恐過節則反自傷故以所勝者制之解説噓呵呼呬吹嘻六字各有主治噓字主治肝經咽喉乾燥面青無華眼紅赤多眵眵眼分泌物凝結成的淡黃色東西叫眼眵目疼痛兩脅下疼痛小便色黃赤或小便不利排尿困難疼痛等疾病呵字主治心經煩躁不安喉部生瘡紅腫熱痛汗多手足掌發熱五心煩熱咽乾口渴等疾病呼字主治脾經有熱痰涎多目發黃喉腫痛阻塞鼻出血口乾舌痛身體沉重腹脹滿不適等疾病呬字主治肺經喘咳煩躁口渴胸膈煩悶不適痰多手足掌發熱受風汗出等疾病吹字主治腎病身體瘦弱面色發黑口乾耳鳴咽喉腫痛兩大腿內側疼痛足根煩熱疼痛等嘻字主治三焦病面頰疼痛喉腫痛阻塞耳閉塞聽覺不聰等以上所治是心肝脾肺腎和三焦這六經的本經的疾病如果五臟虛弱不足引起的疾病還應配合藥物和飲食治療以氣和味補益五臟素問陰陽應象大論説形食味形指形體包括臟腑經脈筋骨皮毛以及血肉等有形之體味指飲食營養物形體依據吸收食飲食營養而生長發育所以又可以説飲食五味滋養著形體味歸形形體得到滋養便能産生元氣元氣就是飲食中的精氣精氣充養形體才能使形體健壯所以説形體必須資靠精氣才能生存氣化活動正常才能産生五臟之精飲食營養豐富才能使形體生長因此補益五臟以飲食五味為宜如果出現了五志喜怒憂思恐失調的疾病就不一定非用藥物治療這時應根據五臟和五志五行生剋的原理採用六字訣功治療為宜六字訣與五志五臟五行的關係見下表五行學説認為五行可以相生與相剋相生就是相互資生和助長相剋就是相互制約和剋制相生的次序是木生火火生土土生金金生水水生木相剋的次序是木剋土土剋水水剋火火剋金金剋木相生相剋以次孳生循環無窮在五行相剋關係中任何一行都具有我克克我兩方面的關係我克者為我所勝克我者為我所不勝所以五行的相剋關係又稱為所勝與所不勝的關係五行相剋可以應用到治療疾病中以肺金在志為憂配屬六字為呬為例剋金者為火心在志為喜配屬六字為呵金克者為木肝在志為怒配屬六字為噓火為金之所不勝木為金之所勝即本篇中所説的喜勝憂火勝金和憂勝怒金勝木肺金憂呬的清肅下降可以抑制肝木怒噓的上亢而心火喜呵的陽熱又可以制約肺金憂呬清肅的太過當肺金過節太過反而自傷出現肺氣下陷氣短而喘等病症時就可以採用心火喜呵所勝剋制肺金憂呬的相剋關係助心火的陽熱溫肺而治氣短或氣喘這就是喜勝憂結合到六字訣就是肺有病時可採用默念呵字的吐納功來治療同樣當肝木怒噓過節而反自傷出現肝陽上亢頭痛目眩等病症時也可以採用肺金憂呬所勝剋制肝木的相剋關係使臟氣清肅下降而抑制肝陽的上亢這就是憂勝怒結合到六字訣就是肝有病時可採用默念呬字的吐納功來治療各髒的六字訣所勝治療法如下憂勝怒肝木有病可默念呬字制約或呬和噓交替默念配合以治療恐勝喜心火有病可默念吹字制約或吹和呵字交替默念配合以治療怒勝思脾土有病可默念噓字制約或噓和呼字交替默念配合以治療喜勝憂肺金有病可用呵字或呵和呬字配合治療思勝恐腎水有病可用呼字或呼和吹字配合治療六字訣應用方式有多種可以單默念一字如噓字也可以按順序念如噓呵呼吹嘻可以結合臟腑病症的主治字念如肝病讀噓字心病讀呵字脾病讀呼字肺病讀呬字腎病讀吹字還可以按寒熱症候念如熱證讀呵字寒證讀吹字不必拘泥一法具體練法宋代鄒朴庵在太上玉軸六字氣訣中述之甚詳準備工作是叩齒三十六以定神先攪口中濁津漱練二三百下候口中成清水即低頭向左而咽之以意送下候汩汩至腹間呼吸方法是低頭開口念呵字以吐出心中毒氣念時耳不得聞聲聞即氣粗反損心氣也念畢低頭閉口以鼻徐徐吸天地之清氣以補心氣吸時耳亦不得聞吸聲聞即氣粗亦損心氣也六字讀法呬讀如絲字音噓讀如虛字音呵讀如喝字音嘻讀如西字音吹與呼讀聲不變二通玄集周天法原文通玄集云其補真妙理只要心頭無事內外俱忘一齊放下把捉得定陽生子時陰生午時靜室披衣握固端坐盤膝蹲下腹肚須臾升身前出胸而微偃首於後後開夾脊雙關肘後微扇三伸腰自尾閭穴如火相似自腰而起擁在夾脊慎勿開關即時甚熱氣壯漸次開夾脊而放氣過仍仰面腦後緊仰以閉上關慎勿令開即覺熱極氣壯漸次入頂以補泥丸髓海則身耐寒暑為習長生之基如前出胸伸腰閉夾脊存而升之腰間火不起當靜坐內觀如法再作以至火起為度自醜行至寅終可止是曰肘後飛金精又曰抽鉛使腎氣生肝氣也又略昂首仰項放令頸下如火方點頭向前低頭曲項退舌尖近後以柱上齶自有津出不漱而咽下還黃庭是名金液還丹四時不拘時候節次行此自艮至巽而已晚間乃勒陽關法自兌至乾而已解説通玄集説補益真氣的奧妙道理並非高深莫測只要放下雜念使諸事不要挂牽心頭將外界刺激和內心的欲望完全忘卻一齊放在一旁專心調息掌握得當就能收到良好效果陽氣生髮於子時時陰氣生髮於午時時在陽氣和陰氣生髮的時辰居於靜室寬衣解帶握固兩手盤膝端坐下收腹肚從容伸直身軀使胸向前挺出而稍仰頭於後採用此姿式練氣日久後便能用氣通開夾脊雙關通關時需用肘在後腰微動三次伸腰使內氣自尾閭穴開始入脊中督脈其感覺如能似火團那樣自腰而起擁至夾脊此時慎勿開關要等待時機感覺火至甚熱氣壯之時方可依次開夾脊下關先放氣過入脊中氣入脊中後仍仰頭腦後使後腦緊枕脊柱封閉上關慎勿讓開覺到內氣如火熱極之時方為氣壯依次再開上關使氣入頭頂以補益泥丸和髓海這時便可使身體耐寒暑這種功法是修練長生的基本功如前姿式挺胸伸腰開夾脊後存內氣而內氣升到腰間後不能起火當靜坐內觀腰間丹田之氣如前法再作以火起為度自丑時時練功到寅時時方可停止這種功法叫肘後飛金精又稱抽鉛使腎氣生肝氣另有一法稍抬頭仰項使頸下如有火起方點頭向前低頭屈項將舌尖稍向後退舐於上齶口內自然就會有津液流出不要漱吐而咽下使歸還於黃庭胃內這種功法叫做金液還丹此功不受時間節氣限制可四季經常練習每日自艮醜寅經震卯練至巽辰已時結束晚間練功時又稱勒陽關法自兌酉練至乾戍亥時結束小結本篇簡明地論述了周天功的練功方法和要點著重講解了收心通關肘後飛金精和金液還丹的練法周天功古人把天體的運行按方位分為度二十八宿把北斗七星的斗柄沿二十八宿排列的軌道旋轉一周稱為一個周天日月沿此循行一周亦稱一周天人身如同一個小天地氣血環行周身一度也叫一周天如靈樞説人身穴道三百六十五穴會以應周天之數氣功家把人的真氣沿經絡循行一周稱為一周天把使真氣循經絡而行的功法叫做周天功周天功有大周天小周天意念周天丹道周天經絡周天等多種本篇所述的小周天即使真氣沿督脈上升再循任脈下降成一封閉圈具體的路線和關口是使丹田真氣伸腰自尾閭穴入腰脊正中督脈擁在夾脊關待氣壯後開夾脊關使真氣達上關玉枕穴待氣壯後開上關使真氣入頭頂百會穴以補泥丸和髓海然後舌舐上齶引口中津液使真氣變成的金液咽下還歸於黃庭胃內最後復歸入丹田再由丹田練氣進入尾閭關這樣督任兩脈便相通形成了一個周天在這一周天中真氣要通過三關入泥丸髓海變為金液入黃庭歸還丹田環循於任督二脈何謂三關及夾脊雙關寥陽殿問答篇説人之尾閭在尻脊上第三節一名長強一名三岔路一名河車路一名禁門其下曰關元其前曰氣海乃陰陽變化之鄉任督交會之處丹書名曰尾閭關者是也人之背脊二十四節上應二十四氣在關在二十四節頭尾之中一名雙關直透頂門此即夾脊關也人之後腦骨一名風池其竅最小而難開欲開此竅舌柱上齶目閉頂門全仗神爐栗火接續沖赴此關乃開此關名玉枕又曰鐵壁也由此可見三關是尾閭關夾脊關玉枕關本文中的夾脊雙關就是夾脊關又名雙關上關就是玉枕關又名鐵壁關該書還對開三關作了詳細描述説下田三寶精氣神名曰人身三寶充盈乃有無路可走之勢自然衝開尾閭從太元逆流隱隱有兩股暖氣上腎堂過脊背但至夾脊者學者道淺寶積未富那能一時便得直透而上切勿煩躁欲速惟自日日行之意中須以心目相送微用提撮穀道肛門法如轆轤循環自然志至氣次時候一到片晌之間夾脊自開雙關自闢直上玉枕玉枕一關名曰鐵壁居頭凹處有一高骨尤難過此必須閉目上視低頭用意直透此關上至泥丸與神交合此時景象有如雷轟電掣火焚波沸種種形聲似真似幻切須牢守身心勿驚勿喜徐徐自定清磬冷然入兩耳泥丸崑崙之間有如火珠一顆盤旋不已隱現於眉間覺從鼻內而下玄膺仍自降入氣管乃由華蓋絳宮直抵丹田此時身心樂快難以言喻所請乾坤交媾罷一點落黃庭是也本文指出為讓真氣過關須從體位和使氣壯實二方面入手體位要端坐盤膝蹲下腹肚須曳升身前出胸而微偃首於後仰面腦後昂首偃項這和一般方書主張正坐身須平直認為體不端直則氣機塞者不同獨僻一言之家另有自己見解對於通過三關主張務必使氣壯實氣不壯則慎勿開關或仰面腦後緊偃以閉上關等待如火相似自腰而起擁在夾脊甚熱氣壯或熱極氣壯方才依次開關如腰間火不起當靜內觀丹田務使火起才開關收心就是止念道家又稱煉已就是要排除各種雜念使心猿歸正意馬收韁正如規中指南所説牢擒意馬鎖心猿慢著功夫鍊汞鉛大道教人先止念念頭不住亦徒然收心的第一要訣為忘記就是練習時要內外俱忘心頭諸事把它們一齊放在一旁只有這樣才能專心守一所以保生祕要説攝心歸一專其一處皆可止念本文將收心列為補真妙理是非常有見地的肘後飛金精又叫抽鉛使腎氣生肝氣法周易參同契認為坎為腎屬北方王癸水色黑在丹稱黑鉛或黑虎所謂抽鉛悟真篇補注説抽鉛添汞猶云取坎填離凡進火退符皆是抽鉛可見抽鉛就是取腎中真水也即真精道家謂之金精以濟心火汞在丹為心屬南方丙丁火使夫妻交媾陰陽相濟或取腎水以涵養肝木使肝氣生髮本文講的是抽鉛使腎氣生肝氣即以水生木使木生髮功法是肘後微扇三目的是以至火起為度可見本功是練精化氣練氣生火使氣為少陽壯火而升發入尾閭進督脈的一種方法道家將精出稱做飛飛即外越高升也飛金精即是使腎中金精外越氣化的意義因本法以微扇肘而起功故曰肘後飛金精金液還丹真氣經三關至泥丸後舌舐上齶就會産生大量口液咽下時可感到清香味美道家認為這是氣化之精液咽下可還歸丹田這就是玉液還丹如果練到氣化精液之後精氣合結感到泥丸中有一小丹結成其紅如桔光似雪融似湯煎味如蜜進入口中可液化如甘泉般清爽蜜糖般甜美吞入丹田可感到轉動就叫做金液還丹黃庭黃乃土色土位中央庭乃階前空地黃庭者中央空地也臍內空地即是黃庭黃庭經説上有黃庭下關元後有幽闕前命門關元穴在臍下三寸黃庭之下即是關元關元之上即是黃庭後為幽闕即是臍名為神闕前為命門又名密戶在背脊第十四椎下黃庭即這些穴位的中空之處丹田乃結丹之所如播種生苗結實成丹之田地故名丹田
