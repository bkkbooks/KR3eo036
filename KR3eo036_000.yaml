祛除足疼痛痹急腰痛小結中醫所説的腳氣病是指以腿足軟弱行動不便為主症的疾病古代因其主症是足緩縱不隨又名緩風或腳弱一般可區分為兩個類型即以足腫者名濕腳氣不腫者名乾腳氣干濕腳氣如出現氣促胸悶心悸煩渴等證則稱為腳氣衝心為腳氣病之危候本篇對腳氣的導引主張動靜功結合在運功方面以活動腳腿及腰為主在靜功方面強調呼氣時要自縱身納氣向下使心內柔和適散散氣向湧泉送氣向下三七不失氣散心兩足跟出氣向下這裡的縱身散心和使心內柔和適散就是要求練功行氣時要松靜自然心寧體散避免緊張克服雜念使自己有意識地處於一種非常舒適輕鬆和寧靜的狀態怎樣才能松靜舒散呢文中提出一是要縱身首先要放縱身體四肢肌肉呼吸使其如散如縱無有緊張二是要散心使身心同時鬆散無有挂牽不為雜念聲色干涉集中心思呼吸行氣使心內柔和適散這樣才能進入最佳狀態使內氣充實運行體內然後以意引氣散氣向湧泉兩足跟出氣向下就可達到以氣攻病治療腳氣的目的縱身散心的功法就是後世的松靜功松即使肌體放鬆靜即使跟出氣心緒寧靜松靜兩者相互促進鬆散之後才容易入靜入靜之後便能放鬆所以松靜自然心寧體散是練功的基本要求也是練好功的要領十二積聚門原文一法以左足踐右足上除心下積聚解説把左腳踏在右腳背上可治心下指胃的積聚原文二法端坐伸腰向日仰頭徐以口納氣因而咽之三十過而止開目除心下積聚解説正坐伸腰仰首望太陽慢慢用口吸氣咽下三十次止開目行功可除心下積聚原文三法左脅側臥伸臂直腳以口納氣鼻吐之周而復始除積聚心下不快解説向左脅側臥臂和腿都伸直用口吸氣鼻出氣反復做可消除積聚和心下不適原文四法以左手按右脅舉右手極形除積及老血解説以左手按右脅盡力將右手舉高可治療積聚和陳舊血積原文五法閉口微息正坐向王氣張鼻取氣逼置臍下小口微出十二通氣以除結聚低頭不息十二通以消飲食令身輕強行之冬月令人不寒解説閉口微微呼吸正坐面對東方張鼻吸氣逼氣下行停於臍下然後用小口慢慢出氣十二通可以去掉結聚再低頭不息十二通可以消化飲食使身體輕快強健冬天這樣做可使人不怕冷原文六法端坐伸腰直上展兩臂仰兩手掌以鼻納氣閉之自極七息名曰蜀王喬除脅下積聚解説正坐伸腰向上直伸兩臂仰兩手掌用鼻吸氣後閉氣到極限時呼出如此七息名為蜀王喬可消除脅下的積聚原文七法向晨去枕正偃臥伸臂脛瞑目閉口不息極張腹兩足再息頃間吸腹仰兩足倍拳欲自微息定復為春三夏五秋七冬九蕩滌五臟津潤六腑所病皆愈復有病積聚者張吸其腹熱乃止癥瘕散破即愈矣解説凌晨去掉枕頭正身仰臥伸展臂腿靜心閣眼閉口不再呼吸使氣達腹中此時儘量使腹鼓起並分開兩足再息時要內收腹部仰起兩腳向後仰屈若欲再行要等到呼吸平穩後才可以重作春天做三遍夏天做五遍秋天七遍冬天九遍此法可洗滌五臟滋潤六腑臟腑的病都可以治好若還有積聚病者可以反復鼓起和內收腹部到有熱感時為止這樣做可以使癥瘕消散病疾痊愈小結積聚是指腹內結塊或脹或痛的一種病證一般認為積是有形的結塊固定不移痛有定處病屬血分在臟聚是無形氣聚散無常痛無定處病屬氣分在腑本病的發生多因七情鬱結飲食內傷等致令肝脾受損臟腑失和氣機阻滯瘀血內停日久漸結而成治療應以理氣活血散積消聚為主本篇針對積聚的成因提出了幾種特殊的納氣導引法吸日精法古代氣功家認為納氣的目的是吸天地之元氣採日月之精華以充養身心祛病延年因而提出了吸日精嗡月精吞日吞月吞雲霧等納氣法本篇第二法端坐伸腰向日仰頭徐以口納氣因而咽之和第五法閉口微息正坐向王氣張鼻取氣逼置臍下小口微出的方法就是吸日精法太陽是溫暖人間養育萬物的天體古人認為面向陽光納氣可助人陽氣溫補五臟吸取日精以壯身吸日精的方法是仰面向日面東而坐以意念想象將陽光中紅紫光芒吸入口中吞咽入體內使到達患有疾病的臟腑若其臟內感覺到內氣已至再以氣攻疾病的患處患處産生了溫暖感覺有汗出時就會療效更好咽氣九次者是為陽數有助陽功效逼置臍下就是使氣沉丹田吸日精法又稱存日攻病法吞日和吸日精稍有不同吞日是以意念想象將太陽吞入體內存入臟腑如火球入身補陽壯精蜀王喬法十四補益門王子喬八神導引法有端坐伸腰直上展兩臂仰兩手掌以鼻納氣閉之自極七息名曰蜀王臺除脅下積聚可見蜀王喬是一功法至於為何名曰蜀王喬或蜀王臺尚待考察該功法的特點是將兩臂向上伸直仰兩手掌用鼻吸氣閉氣於內到極限時再緩慢吐出如此七息而止主治脅下積聚腹吸法本篇第七法介紹了腹吸法即腹式呼吸法的具體練功方法體位以正仰臥去枕伸展手及腿閉目寧神閉口為宜呼吸方法採用不息法呼吸的要領是使氣達腹中先儘量使腹鼓起再吸或呼時使腹儘量內收如此反復鼓起和內收腹部使腹中有熱感時為止這是練氣功的最基本方法十三脾胃門原文脾胃不和不能飲食欹身兩手一向偏側急努身舒頭共手竟扒相牽漸漸一時盡勢氣共力皆和來去左右亦然各三七項前後兩角緩舒手如是似向外扒放縱身心搖三七遞互亦然去太倉不和臂腰虛悶也解説治療脾胃不和不能飲食可採用斜身兩手偏向一側急挺身舒展放鬆頭部和兩手兩手相抓互相牽拉並慢慢牽拉一會兒儘量保持姿勢不變作時氣力要緩和自然然後斜身向另一方左右來去